    // ========== 当前Tab & 分页状态 ==========

    var pageSize = 10;

    // ========== 初始化日期控件 ==========
    flatpickr("#callerDateStart", { dateFormat: "Y-m-d H:i:S", locale: "zh", enableTime: true, time_24hr: true, allowInput: true });
    flatpickr("#callerDateEnd", { dateFormat: "Y-m-d H:i:S", locale: "zh", enableTime: true, time_24hr: true, allowInput: true });
    flatpickr("#supplierDateStart", { dateFormat: "Y-m-d H:i:S", locale: "zh", enableTime: true, time_24hr: true, allowInput: true });
    flatpickr("#supplierDateEnd", { dateFormat: "Y-m-d H:i:S", locale: "zh", enableTime: true, time_24hr: true, allowInput: true });

    // ========== URL参数：从链路实时监控跳转过来时预填筛选 ==========
    var urlParams = new URLSearchParams(window.location.search);
    var preTab = urlParams.get('tab');
    var preUrl = urlParams.get('url');
    if (preTab === 'supplier') {
        currentTab = 'supplier';
        document.getElementById('tabCaller').classList.remove('active');
        document.getElementById('tabSupplier').classList.add('active');
        document.getElementById('filterCaller').style.display = 'none';
        document.getElementById('filterSupplier').style.display = 'flex';
        document.getElementById('callerTableContainer').style.display = 'none';
        document.getElementById('supplierTableContainer').style.display = '';
        if (preUrl) {
            document.getElementById('filterSupplierUrl').value = preUrl;
        }
    }

    // ========== 初始化查询 ==========
    if (currentTab === 'supplier') {
        doQuerySupplier();
    } else {
        doQueryCaller();
    }

    // ========== Tab切换 ==========
    function switchTab(tab) {
        currentTab = tab;
        currentPage = 1;
        document.getElementById('tabCaller').classList.toggle('active', tab === 'caller');
        document.getElementById('tabSupplier').classList.toggle('active', tab === 'supplier');
        document.getElementById('filterCaller').style.display = tab === 'caller' ? 'flex' : 'none';
        document.getElementById('filterSupplier').style.display = tab === 'supplier' ? 'flex' : 'none';
        document.getElementById('callerTableContainer').style.display = tab === 'caller' ? '' : 'none';
        document.getElementById('supplierTableContainer').style.display = tab === 'supplier' ? '' : 'none';
        if (tab === 'caller') {
            doQueryCaller();
        } else {
            doQuerySupplier();
        }
    }

    // ========== 调用状态徽章 ==========
    function getStatusBadge(status) {
        var cls = 'success';
        if (status === '失败') cls = 'fail';
        else if (status === '超时') cls = 'timeout';
        var dot = (status === '失败' || status === '超时') ? '<span class="pulse-dot"></span> ' : '';
        return '<span class="status-badge ' + cls + '">' + dot + status + '</span>';
    }

    // ========== 渲染调用方表格 ==========
    function renderCallerTable(data) {
        filteredCallerData = data;
        var total = data.length;
        var totalPages = Math.ceil(total / pageSize) || 1;
        if (currentPage < 1) currentPage = 1;
        if (currentPage > totalPages) currentPage = totalPages;

        var start = (currentPage - 1) * pageSize;
        var end = Math.min(start + pageSize, total);
        var pageData = data.slice(start, end);

        var tbody = document.getElementById('callerTableBody');
        if (pageData.length === 0) {
            tbody.innerHTML = '<tr><td colspan="10" style="padding:40px 0;color:#999;">暂无数据</td></tr>';
        } else {
            var html = '';
            for (var i = 0; i < pageData.length; i++) {
                var r = pageData[i];
                var seq = start + i + 1;
                var respClass = r.respTime > 1000 ? ' class="val-error"' : '';
                html += '<tr>'
                    + '<td>' + seq + '</td>'
                    + '<td>' + r.caller + '</td>'
                    + '<td>' + r.service + '</td>'
                    + '<td>' + r.ip + '</td>'
                    + '<td style="font-size:13px;">' + r.batchNo + '</td>'
                    + '<td>' + r.cached + '</td>'
                    + '<td' + respClass + '>' + r.respTime.toLocaleString() + '</td>'
                    + '<td style="font-size:13px;">' + r.callTime + '</td>'
                    + '<td>' + getStatusBadge(r.status) + '</td>'
                    + '<td><div class="ops-cell"><button class="action-link" onclick="openCallerDetail(' + r.id + ')">详情</button></div></td>'
                    + '</tr>';
            }
            tbody.innerHTML = html;
        }
        renderPagination(total, totalPages);
    }

    // ========== 渲染供应商表格 ==========
    function renderSupplierTable(data) {
        filteredSupplierData = data;
        var total = data.length;
        var totalPages = Math.ceil(total / pageSize) || 1;
        if (currentPage < 1) currentPage = 1;
        if (currentPage > totalPages) currentPage = totalPages;

        var start = (currentPage - 1) * pageSize;
        var end = Math.min(start + pageSize, total);
        var pageData = data.slice(start, end);

        var tbody = document.getElementById('supplierTableBody');
        if (pageData.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" style="padding:40px 0;color:#999;">暂无数据</td></tr>';
        } else {
            var html = '';
            for (var i = 0; i < pageData.length; i++) {
                var r = pageData[i];
                var seq = start + i + 1;
                var respClass = r.respTime > 1000 ? ' class="val-error"' : '';
                html += '<tr>'
                    + '<td>' + seq + '</td>'
                    + '<td>' + r.supplier + '</td>'
                    + '<td style="font-size:13px;text-align:left;padding-left:12px;">' + r.url + '</td>'
                    + '<td' + respClass + '>' + r.respTime.toLocaleString() + '</td>'
                    + '<td style="font-size:13px;">' + r.callTime + '</td>'
                    + '<td>' + getStatusBadge(r.status) + '</td>'
                    + '<td><div class="ops-cell"><button class="action-link" onclick="openSupplierDetail(' + r.id + ')">详情</button></div></td>'
                    + '</tr>';
            }
            tbody.innerHTML = html;
        }
        renderPagination(total, totalPages);
    }

    // ========== 渲染分页栏 ==========
    function renderPagination(total, totalPages) {
        var html = '<span class="total-text">共 ' + total + ' 条</span>';
        html += '<button class="page-btn" ' + (currentPage === 1 ? 'disabled' : '') + ' onclick="goToPage(' + (currentPage - 1) + ')">&lt;</button>';

        var startP = Math.max(1, currentPage - 2);
        var endP = Math.min(totalPages, startP + 4);
        if (endP - startP < 4) startP = Math.max(1, endP - 4);
        for (var p = startP; p <= endP; p++) {
            html += '<span class="page-number' + (p === currentPage ? ' active' : '') + '" onclick="goToPage(' + p + ')">' + p + '</span>';
        }

        html += '<button class="page-btn" ' + (currentPage === totalPages ? 'disabled' : '') + ' onclick="goToPage(' + (currentPage + 1) + ')">&gt;</button>';

        html += '<select class="page-size-select" onchange="changePageSize(this.value)">';
        var sizes = [10, 20, 50];
        for (var i = 0; i < sizes.length; i++) {
            html += '<option' + (sizes[i] === pageSize ? ' selected' : '') + '>' + sizes[i] + '条/页</option>';
        }
        html += '</select>';

        html += '<div class="jump-section"><span>前往</span>'
            + '<input type="text" id="jumpPageInput" value="' + currentPage + '" onkeydown="if(event.key===\'Enter\') jumpToPage()">'
            + '<span>页</span></div>';

        document.getElementById('paginationWrap').innerHTML = html;
    }

    function goToPage(p) {
        currentPage = p;
        if (currentTab === 'caller') renderCallerTable(filteredCallerData);
        else renderSupplierTable(filteredSupplierData);
    }

    function changePageSize(size) {
        pageSize = parseInt(size) || 10;
        currentPage = 1;
        if (currentTab === 'caller') renderCallerTable(filteredCallerData);
        else renderSupplierTable(filteredSupplierData);
    }

    function jumpToPage() {
        var val = parseInt(document.getElementById('jumpPageInput').value);
        if (!isNaN(val) && val >= 1) {
            currentPage = val;
            if (currentTab === 'caller') renderCallerTable(filteredCallerData);
            else renderSupplierTable(filteredSupplierData);
        }
    }

    // ========== 调用方查询 & 重置 ==========
    function doQueryCaller() {
        var callerFilter = document.getElementById('filterCallerName').value;
        var statusFilter = document.getElementById('filterCallerStatus').value;
        var dateStart = document.getElementById('callerDateStart').value;
        var dateEnd = document.getElementById('callerDateEnd').value;
        var filtered = callerData.filter(function(r) {
            if (callerFilter && r.caller !== callerFilter) return false;
            if (statusFilter && r.status !== statusFilter) return false;
            if (dateStart && r.callTime < dateStart) return false;
            if (dateEnd && r.callTime > dateEnd) return false;
            return true;
        });
        currentPage = 1;
        renderCallerTable(filtered);
    }

    function doResetCaller() {
        document.getElementById('filterCallerName').value = '';
        document.getElementById('filterCallerStatus').value = '';
        if (document.getElementById('callerDateStart')._flatpickr) document.getElementById('callerDateStart')._flatpickr.clear();
        if (document.getElementById('callerDateEnd')._flatpickr) document.getElementById('callerDateEnd')._flatpickr.clear();
        currentPage = 1;
        renderCallerTable(callerData);
    }

    // ========== 供应商查询 & 重置 ==========
    function doQuerySupplier() {
        var supplierFilter = document.getElementById('filterSupplierName').value;
        var urlFilter = document.getElementById('filterSupplierUrl').value.trim();
        var statusFilter = document.getElementById('filterSupplierStatus').value;
        var dateStart = document.getElementById('supplierDateStart').value;
        var dateEnd = document.getElementById('supplierDateEnd').value;
        var filtered = supplierData.filter(function(r) {
            if (supplierFilter && r.supplier !== supplierFilter) return false;
            if (urlFilter && r.url !== urlFilter) return false;
            if (statusFilter && r.status !== statusFilter) return false;
            if (dateStart && r.callTime < dateStart) return false;
            if (dateEnd && r.callTime > dateEnd) return false;
            return true;
        });
        currentPage = 1;
        renderSupplierTable(filtered);
    }

    function doResetSupplier() {
        document.getElementById('filterSupplierName').value = '';
        document.getElementById('filterSupplierUrl').value = '';
        document.getElementById('filterSupplierStatus').value = '';
        if (document.getElementById('supplierDateStart')._flatpickr) document.getElementById('supplierDateStart')._flatpickr.clear();
        if (document.getElementById('supplierDateEnd')._flatpickr) document.getElementById('supplierDateEnd')._flatpickr.clear();
        currentPage = 1;
        renderSupplierTable(supplierData);
    }

    // ========== 详情弹窗：调用方 ==========
    function openCallerDetail(id) {
        var r = null;
        for (var i = 0; i < callerData.length; i++) {
            if (callerData[i].id === id) { r = callerData[i]; break; }
        }
        if (!r) return;
        document.getElementById('detailModalTitle').textContent = '调用方详情';
        document.getElementById('detailGrid').innerHTML =
            '<div class="detail-item"><div class="detail-label">编号</div><div class="detail-value">' + r.id + '</div></div>'
            + '<div class="detail-item"><div class="detail-label">调用方</div><div class="detail-value">' + r.caller + '</div></div>'
            + '<div class="detail-item"><div class="detail-label">服务名称</div><div class="detail-value">' + r.service + '</div></div>'
            + '<div class="detail-item"><div class="detail-label">调用方IP</div><div class="detail-value">' + r.ip + '</div></div>'
            + '<div class="detail-item"><div class="detail-label">调用批次号</div><div class="detail-value">' + r.batchNo + '</div></div>'
            + '<div class="detail-item"><div class="detail-label">是否缓存返回</div><div class="detail-value">' + r.cached + '</div></div>'
            + '<div class="detail-item"><div class="detail-label">响应时间</div><div class="detail-value">' + r.respTime + 'ms</div></div>'

    // ========== 详情弹窗：供应商 ==========
    function openSupplierDetail(id) {
        var r = null;

        document.getElementById('detailModal').classList.remove('active');
