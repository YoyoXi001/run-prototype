<script>
    function formatDate(d) {
        var y = d.getFullYear();
        var m = ('0' + (d.getMonth() + 1)).slice(-2);
        var day = ('0' + d.getDate()).slice(-2);
        return y + '-' + m + '-' + day;
    }

    // ========== 账单周期选择 ==========
    function onPeriodTypeChange() {
        var type = document.getElementById('filterPeriodType').value;
        var sel = document.getElementById('filterPeriodValue');
        sel.innerHTML = '';
        var now = new Date();
        var y = now.getFullYear();
        var m = now.getMonth(); // 0-indexed

        if (type === 'month') {
            // 最近12个月，默认上个月
            for (var i = 1; i <= 12; i++) {
                var d = new Date(y, m - i, 1);
                var startY = d.getFullYear();
                var startM = d.getMonth();
                var start = formatDate(new Date(startY, startM, 1));
                var end = formatDate(new Date(startY, startM + 1, 0));
                var label = startY + '年' + (startM + 1) + '月';
                var opt = document.createElement('option');
                opt.value = start + '|' + end;
                opt.textContent = label;
                sel.appendChild(opt);
            }
        } else if (type === 'quarter') {
            // 最近8个季度，默认上季度
            var currentQ = Math.floor(m / 3); // 0-3
            for (var i = 1; i <= 8; i++) {
                var qOffset = currentQ - i;
                var qYear = y + Math.floor(qOffset / 4);
                var q = ((qOffset % 4) + 4) % 4; // 0-3
                var start = formatDate(new Date(qYear, q * 3, 1));
                var end = formatDate(new Date(qYear, q * 3 + 3, 0));
                var label = qYear + '年Q' + (q + 1);
                var opt = document.createElement('option');
                opt.value = start + '|' + end;
                opt.textContent = label;
                sel.appendChild(opt);
            }
        } else if (type === 'year') {
            // 最近5年，默认去年
            for (var i = 1; i <= 5; i++) {
                var yr = y - i;
                var start = yr + '-01-01';
                var end = yr + '-12-31';
                var label = yr + '年';
                var opt = document.createElement('option');
                opt.value = start + '|' + end;
                opt.textContent = label;
                sel.appendChild(opt);
            }
        }
    }

    // 初始化周期选择器（默认按月-上个月）
    onPeriodTypeChange();

    // 列表数据：计费模式仅保留 按次、包量、阶梯，与计费管理一致
    // price 字段支持 HTML（<br>换行），参考计费管理的 price-cell 样式
    // billingCode 引用计费管理中对应的计费编码
    var allData = [
        { id:'BILL-202606-001', billingCode:'JF-API-QCC-QYJBXX-JT-003', supplier:'企查查', mode:'阶梯', price:'≤3万次¥1.8<br>3-8万¥1.2<br>&gt;8万¥0.8', usage:10000, amount:'¥500.00', apis:['企业基本信息'], tenants:[{name:'租赁',usage:5200},{name:'保险',usage:3000},{name:'资产',usage:1800}] },
        { id:'BILL-202606-002', billingCode:'JF-API-TYC-SFXP-BL-002', supplier:'天眼查', mode:'包量', price:'¥60,000/8万次<br>超额¥0.8/次', usage:85000, amount:'¥85,000.00', apis:['司法风险'], tenants:[{name:'租赁',usage:45000},{name:'风控',usage:25000},{name:'信贷',usage:15000}] },
        { id:'BILL-202606-003', billingCode:'JF-API-TYC-QYJBXX-AC-001', supplier:'天眼查', mode:'按次', price:'¥1.0/次', usage:52000, amount:'¥52,000.00', apis:['企业基本信息'], tenants:[{name:'保险',usage:32000},{name:'资产',usage:12000},{name:'信贷',usage:8000}] },
        { id:'BILL-202606-004', billingCode:'JF-API-ZCX-XYPF-JT-005', supplier:'中诚信', mode:'阶梯', price:'≤5万次¥2.0<br>5-10万¥1.5<br>&gt;10万¥1.0', usage:92000, amount:'¥80,000.00', apis:['信用评分'], tenants:[{name:'资产',usage:52000},{name:'风控',usage:28000},{name:'信贷',usage:12000}] },
        { id:'BILL-202606-005', billingCode:'JF-API-QHZX-FQZPF-AC-007', supplier:'前海征信', mode:'按次', price:'¥0.8/次', usage:38500, amount:'¥30,800.00', apis:['反欺诈评分'], tenants:[{name:'信贷',usage:28500},{name:'风控',usage:10000}] },
        { id:'BILL-202606-006', billingCode:'JF-API-BSZX-GRXYBG-AC-006', supplier:'百行征信', mode:'按次', price:'¥2.5/次', usage:21800, amount:'¥54,500.00', apis:['个人信用报告'], tenants:[{name:'风控',usage:15800},{name:'信贷',usage:6000}] }
    ];

    function getSelectedPeriod() {
        var val = document.getElementById('filterPeriodValue').value;
        if (val) {
            return val.replace('|', ' ~ ');
        }
        return '';
    }

    function renderTable(data) {
        var tbody = document.getElementById('tableBody');
        var period = getSelectedPeriod();
        if (data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="9" style="padding:40px 0;color:#999;">暂无数据</td></tr>';
            document.getElementById('totalText').textContent = '共 0 条';
            return;
        }
        var html = '';
        for (var i = 0; i < data.length; i++) {
            var r = data[i];
            html += '<tr>'
                + '<td style="font-size:12px;">' + r.id + '</td>'
                + '<td style="font-size:12px;letter-spacing:0.3px;" title="' + r.billingCode + '">' + r.billingCode + '</td>'
                + '<td>' + r.supplier + '</td>'
                + '<td>' + r.mode + '</td>'
                + '<td class="price-cell">' + r.price + '</td>'
                + '<td>' + (r.usage || 0).toLocaleString() + '</td>'
                + '<td style="white-space:nowrap;font-size:12px;">' + period + '</td>'
                + '<td class="amount-text">' + r.amount + '</td>'
                + '<td><a class="action-link" href="账单明细.html?id=' + r.id + '">查看明细</a></td>'
                + '</tr>';
        }
        tbody.innerHTML = html;
        document.getElementById('totalText').textContent = '共 ' + data.length + ' 条';
    }

    function doQuery() {
        var supplier = document.getElementById('filterSupplier').value;

        var filtered = allData.filter(function(r) {
            if (supplier && r.supplier !== supplier) return false;
            return true;
        });
        renderTable(filtered);
    }

    function doReset() {
        document.getElementById('filterSupplier').value = '';
        // 重置为按月-上个月
        document.getElementById('filterPeriodType').value = 'month';
        onPeriodTypeChange();
        renderTable(allData);
    }

    // 初始渲染
    renderTable(allData);

    // ========== 自定义账单弹窗 ==========
    // 联动辅助函数
    function cbGetSuppliers() {
        var set = {};
        allData.forEach(function(r) { set[r.supplier] = true; });
        return Object.keys(set);
    }
    function cbGetModes(supplier) {
        var set = {};
        allData.forEach(function(r) {
            if (!supplier || r.supplier === supplier) set[r.mode] = true;
        });
        return Object.keys(set);
    }
    function cbGetApis(supplier, mode) {
        var set = {};
        allData.forEach(function(r) {
            if ((!supplier || r.supplier === supplier) && (!mode || r.mode === mode)) {
                r.apis.forEach(function(a) { set[a] = true; });
            }
        });
        return Object.keys(set);
    }
    function cbGetTenants() {
        var set = {};
        allData.forEach(function(r) {
            r.tenants.forEach(function(t) { set[t.name] = true; });
        });
        return Object.keys(set);
    }
    function cbPopulateSelect(id, options, includeAll) {
        var sel = document.getElementById(id);
        sel.innerHTML = '';
        if (includeAll === 'unlimited' || includeAll === 'both') {
            var o = document.createElement('option');
            o.value = '';
            o.textContent = '不限';
            sel.appendChild(o);
        }
        if (includeAll === 'all' || includeAll === 'both') {
            var o = document.createElement('option');
            o.value = '__all__';
            o.textContent = '全部';
            sel.appendChild(o);
        }
        options.forEach(function(opt) {
            var o = document.createElement('option');
            o.value = opt;
            o.textContent = opt;
            sel.appendChild(o);
        });
    }

    function cbOnSupplierChange() {
        var supplier = document.getElementById('cbSupplier').value;
        cbPopulateSelect('cbMode', cbGetModes(supplier), 'all');
        cbOnModeChange();
    }
    function cbOnModeChange() {
        var supplier = document.getElementById('cbSupplier').value;
        var mode = document.getElementById('cbMode').value;
        cbPopulateSelect('cbApi', cbGetApis(supplier, mode), 'both');
    }
    function cbUpdatePreview() {
        var filtered = cbGetFilteredData();
        var showDetail = document.getElementById('cbTenantDetail').value === 'show';
        var count = showDetail ? 0 : filtered.length;
        if (showDetail) {
            var tenant = document.getElementById('cbTenant').value;
            filtered.forEach(function(r) {
                var ts = r.tenants;
                if (tenant && tenant !== '__all__') {
                    ts = ts.filter(function(t) { return t.name === tenant; });
                }
                count += ts.length;
            });
        }
        document.getElementById('cbPreview').innerHTML =
            '<i class="el-icon-document" style="color:#f89d34;margin-right:4px;"></i>' +
            '当前筛选条件匹配 <strong style="color:#f89d34;">' + count + '</strong> 条' +
            (showDetail ? '租户明细' : '账单记录') + '，点击"导出 Excel"下载。';
    }

    function cbGetFilteredData() {
        var supplier = document.getElementById('cbSupplier').value;
        var mode = document.getElementById('cbMode').value;
        var api = document.getElementById('cbApi').value;
        var tenant = document.getElementById('cbTenant').value;
        return allData.filter(function(r) {
            if (supplier && r.supplier !== supplier) return false;
            if (mode && r.mode !== mode) return false;
            if (api && api !== '__all__') {
                if (r.apis.indexOf(api) === -1) return false;
            }
            if (tenant && tenant !== '__all__') {
                var hasTenant = r.tenants.some(function(t) { return t.name === tenant; });
                if (!hasTenant) return false;
            }
            return true;
        });
    }

    function openCustomBillModal() {
        cbPopulateSelect('cbSupplier', cbGetSuppliers(), 'all');
        cbPopulateSelect('cbMode', cbGetModes(''), 'all');
        cbPopulateSelect('cbApi', cbGetApis('', ''), 'both');
        cbPopulateSelect('cbTenant', cbGetTenants(), 'both');
        document.getElementById('cbTenantDetail').value = 'hide';
        cbUpdatePreview();
        document.getElementById('customBillModal').classList.add('show');
    }

    function closeCustomBillModal() {
        document.getElementById('customBillModal').classList.remove('show');
    }

    document.getElementById('customBillModal').addEventListener('click', function(e) {
        if (e.target === this) closeCustomBillModal();
    });

    // 联动事件绑定（HTML onchange 已设置）
    document.getElementById('cbTenantDetail').addEventListener('change', cbUpdatePreview);
    document.getElementById('cbTenant').addEventListener('change', cbUpdatePreview);
    document.getElementById('cbApi').addEventListener('change', cbUpdatePreview);

    // Excel 样式常量
    var thinBorder = { style:'thin', color:{rgb:'FFB2B2B2'} };
    var allBorders = { top:thinBorder, bottom:thinBorder, left:thinBorder, right:thinBorder };
    var headerFont = { bold:true, sz:10, name:'Arial', color:{rgb:'FF333333'} };
    var headerFill = { fgColor:{rgb:'FFF2F2F2'} };
    var headerAlign = { horizontal:'center', vertical:'center', wrapText:true };
    var cellAlign = { horizontal:'center', vertical:'center' };
    var dataFont = { sz:9, name:'Arial', color:{rgb:'FF333333'} };

    function applyCellStyle(ws, ref, style) {
        if (!ws[ref]) return;
        ws[ref].s = style;
    }
    function styleRange(ws, rowIdx, colStart, colEnd, style) {
        for (var c = colStart; c <= colEnd; c++) {
            applyCellStyle(ws, XLSX.utils.encode_cell({r:rowIdx, c:c}), style);
        }
    }
    function downloadWorkbook(wb, filename) {
        var wbout = XLSX.write(wb, { bookType:'xlsx', type:'array', cellStyles:true });
        var blob = new Blob([wbout], { type:'application/octet-stream' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    function cbDoExport() {
        var filtered = cbGetFilteredData();
        var showDetail = document.getElementById('cbTenantDetail').value === 'show';
        var tenant = document.getElementById('cbTenant').value;
        var period = getSelectedPeriod();

        var aoa = [];
        aoa.push(['外数平台 - 自定义账单导出']);
        aoa.push(['账单周期：' + period + ' 导出时间：' + new Date().toLocaleString('zh-CN')]);
        aoa.push([]);

        if (showDetail) {
            aoa.push(['计费编号', '供应商', '计费模式', 'API', '租户', '使用次数', '使用占比', '分摊金额']);
            filtered.forEach(function(r) {
                var tenants = r.tenants;
                if (tenant && tenant !== '__all__') {
                    tenants = tenants.filter(function(t) { return t.name === tenant; });
                }
                var totalUsage = r.usage;
                var totalAmount = parseFloat(r.amount.replace(/[¥,]/g, '')) || 0;
                tenants.forEach(function(t) {
                    var ratio = totalUsage > 0 ? (t.usage / totalUsage) : 0;
                    var shareAmt = totalAmount * ratio;
                    aoa.push([r.billingCode, r.supplier, r.mode, r.apis.join('、'), t.name, t.usage, (ratio * 100).toFixed(1) + '%', shareAmt.toFixed(2)]);
                });
            });
        } else {
            aoa.push(['计费编号', '供应商', '计费模式', '单价', 'API', '使用次数', '应付金额']);
            filtered.forEach(function(r) {
                var priceText = r.price.replace(/<br>/g, ' ');
                aoa.push([r.billingCode, r.supplier, r.mode, priceText, r.apis.join('、'), r.usage, r.amount.replace(/[¥,]/g, '')]);
            });
        }

        var colCount = showDetail ? 8 : 7;
        var ws = XLSX.utils.aoa_to_sheet(aoa);
        ws['!merges'] = [
            { s:{r:0,c:0}, e:{r:0,c:colCount - 1} },
            { s:{r:1,c:0}, e:{r:1,c:colCount - 1} }
        ];
        ws['!cols'] = showDetail
            ? [{wch:28},{wch:10},{wch:10},{wch:16},{wch:8},{wch:12},{wch:10},{wch:14}]
            : [{wch:28},{wch:10},{wch:10},{wch:22},{wch:16},{wch:12},{wch:14}];

        // 样式
        applyCellStyle(ws, 'A1', { font:{bold:true, sz:13, name:'Arial', color:{rgb:'FF1f2f3d'}}, alignment:{horizontal:'center', vertical:'center'} });
        applyCellStyle(ws, 'A2', { font:{sz:9, name:'Arial', color:{rgb:'FF666666'}}, alignment:{vertical:'center'} });
        styleRange(ws, 3, 0, colCount - 1, { font:headerFont, fill:headerFill, alignment:headerAlign, border:allBorders });
        var dataRowCount = aoa.length - 4;
        for (var di = 0; di < dataRowCount; di++) {
            styleRange(ws, 4 + di, 0, colCount - 1, { font:dataFont, alignment:cellAlign, border:allBorders });
        }

        var wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, '自定义账单');
        var fname = '自定义账单_' + new Date().toISOString().slice(0, 10) + '.xlsx';
        downloadWorkbook(wb, fname);
        closeCustomBillModal();
    }
</script>
<script>
document.addEventListener('click', function(e) {
    var link = e.target.closest('a.sidebar-item, a.menu-item');
    if (link && link.getAttribute('href') === 'index.html') {
        e.preventDefault();
        document.querySelectorAll('.sidebar-item, .menu-item').forEach(function(m) { m.classList.remove('active'); });
        link.classList.add('active');
    }
});
</script>
<script>
document.addEventListener('click', function(e) {
    var navTab = e.target.closest('a.nav-tab');
    if (navTab) {
        var navKeys = {'数据门户':'portal','外源管理':'external','服务管理':'service','监控统计':'monitor','运营管理':'operation','个人中心':'personal','系统管理':'system'};
        var text = navTab.textContent.trim();
        if (navKeys[text]) localStorage.setItem('_navMenu', navKeys[text]);
    }
});
</script>
