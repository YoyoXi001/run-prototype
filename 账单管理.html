<script>
// ==================== 工具函数 ====================
function formatDate(d) {
    var y = d.getFullYear();
    var m = ('0' + (d.getMonth() + 1)).slice(-2);
    var day = ('0' + d.getDate()).slice(-2);
    return y + '-' + m + '-' + day;
}
function formatNum(n) { return (n || 0).toLocaleString(); }

var filteredSummary = summaryData.slice();

function getFilteredSummary() {
    var supplier = document.getElementById('sFilterSupplier').value;
    var tenant = document.getElementById('sFilterTenant').value;
    return summaryData.filter(function(r) {
        if (supplier && r.supplier !== supplier) return false;
        if (tenant && r.tenant !== tenant) return false;
        return true;
    });
}

function renderSummaryTable(data) {
    var tbody = document.getElementById('summaryTableBody');
    if (data.length === 0) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="7">暂无数据</td></tr>';
        document.getElementById('summaryTotalText').textContent = '共 0 条';
        return;
    }
    // 按供应商分组，计算每个供应商的总计费次数（用于分摊比例）
    var supplierTotals = {};
    for (var i = 0; i < data.length; i++) {
        var s = data[i].supplier;
        if (!supplierTotals[s]) supplierTotals[s] = 0;
        supplierTotals[s] += data[i].billCount;
    }
    var html = '';
    var totQuery = 0, totCache = 0, totBill = 0, totCost = 0;
    for (var i = 0; i < data.length; i++) {
        var r = data[i];
        var ratio = supplierTotals[r.supplier] > 0 ? r.billCount / supplierTotals[r.supplier] : 0;
        var unitCost = supplierUnitCost[r.supplier] || 0;
        var cost = r.billCount * unitCost;
        totQuery += r.totalQuery;
        totCache += r.cacheHit;
        totBill += r.billCount;
        totCost += cost;
        html += '<tr>'
            + '<td>' + r.supplier + '</td>'
            + '<td>' + r.tenant + '</td>'
            + '<td>' + formatNum(r.totalQuery) + '</td>'
            + '<td>' + formatNum(r.cacheHit) + '</td>'
            + '<td>' + formatNum(r.billCount) + '</td>'
            + '<td class="ratio-text">' + (ratio * 100).toFixed(1) + '%</td>'
            + '<td class="amount-text">' + formatMoney(cost) + '</td>'
            + '</tr>';
    }
    // 合计行
    html += '<tr class="total-row">'
        + '<td>合计</td><td></td>'
        + '<td>' + formatNum(totQuery) + '</td>'
        + '<td>' + formatNum(totCache) + '</td>'
        + '<td>' + formatNum(totBill) + '</td>'
        + '<td></td>'
        + '<td class="amount-text">' + formatMoney(totCost) + '</td>'
        + '</tr>';
    tbody.innerHTML = html;
    document.getElementById('summaryTotalText').textContent = '共 ' + data.length + ' 条';
}

function doSummaryQuery() {
    filteredSummary = getFilteredSummary();
    renderSummaryTable(filteredSummary);
}

function renderDetailTable(data) {
    var tbody = document.getElementById('detailTableBody');
    if (data.length === 0) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="11">暂无数据</td></tr>';
        updateDetailPagination(1, 0);
        return;
    }
    var totalPages = Math.ceil(data.length / detailPageSize) || 1;
    if (detailPage > totalPages) detailPage = totalPages;
    var pageData = data.slice((detailPage - 1) * detailPageSize, detailPage * detailPageSize);

    var html = '';
    var totQuery = 0, totCache = 0, totBill = 0, totCost = 0;
    // 合计基于全部筛选后数据
    for (var i = 0; i < data.length; i++) {
        totQuery += data[i].totalQuery;
        totCache += data[i].cacheHit;
        totBill += data[i].billCount;
        totCost += data[i].cost;
    }
    // 当前页数据渲染
    for (var i = 0; i < pageData.length; i++) {
        var r = pageData[i];
        html += '<tr>'
            + '<td>' + r.supplier + '</td>'
            + '<td>' + r.tenant + '</td>'
            + '<td>' + r.company + '</td>'
            + '<td>' + r.dept + '</td>'
            + '<td>' + r.system + '</td>'

            + '<td>' + formatNum(r.totalQuery) + '</td>'
            + '<td>' + formatNum(r.cacheHit) + '</td>'
            + '<td>' + formatNum(r.billCount) + '</td>'
            + '<td class="amount-text">' + formatMoney(r.cost) + '</td>'
            + '</tr>';
    }
    // 合计行
    html += '<tr class="total-row">'
        + '<td>合计</td><td></td><td></td><td></td><td></td><td></td><td></td>'
        + '<td>' + formatNum(totQuery) + '</td>'
        + '<td>' + formatNum(totCache) + '</td>'
        + '<td>' + formatNum(totBill) + '</td>'
        + '<td class="amount-text">' + formatMoney(totCost) + '</td>'
        + '</tr>';
    tbody.innerHTML = html;
    updateDetailPagination(totalPages, data.length);
}

function updateDetailPagination(totalPages, totalCount) {
    var container = document.getElementById('detailPagination');
    if (!container) return;
    var cp = detailPage;
    var html = '<span class="total-text">共 ' + totalCount + ' 条</span>';
    html += '<button class="page-btn" ' + (cp === 1 ? 'disabled' : '') + ' onclick="changeDetailPage(' + (cp - 1) + ')">&lt;</button>';
    var start = Math.max(1, cp - 2), end = Math.min(totalPages, cp + 2);
    for (var i = start; i <= end; i++) {
        html += '<span class="page-number ' + (i === cp ? 'active' : '') + '" onclick="changeDetailPage(' + i + ')">' + i + '</span>';
    }
    html += '<button class="page-btn" ' + (cp === totalPages ? 'disabled' : '') + ' onclick="changeDetailPage(' + (cp + 1) + ')">&gt;</button>';
    html += '<select class="page-size-select" onchange="changeDetailPageSize(this.value)">';
    html += '<option value="10" ' + (detailPageSize === 10 ? 'selected' : '') + '>10条/页</option>';
    html += '<option value="20" ' + (detailPageSize === 20 ? 'selected' : '') + '>20条/页</option>';
    html += '<option value="50" ' + (detailPageSize === 50 ? 'selected' : '') + '>50条/页</option>';
    html += '</select>';
    html += '<div class="jump-section"><span>前往</span><input type="number" id="detailJumpPage" min="1" max="' + totalPages + '" value="' + cp + '" onkeydown="if(event.keyCode===13) jumpDetailPage()"><span>页</span></div>';
    container.innerHTML = html;
}

function changeDetailPage(page) {
    detailPage = page;
    renderDetailTable(filteredDetail);
}

function changeDetailPageSize(size) {
    detailPageSize = parseInt(size);
    detailPage = 1;
    renderDetailTable(filteredDetail);
}

function jumpDetailPage() {
    var totalPages = Math.ceil(filteredDetail.length / detailPageSize) || 1;
    var p = parseInt(document.getElementById('detailJumpPage').value);
    if (p >= 1 && p <= totalPages) {
        detailPage = p;
        renderDetailTable(filteredDetail);
    }
}

function doDetailQuery() {
    detailPage = 1;
    filteredDetail = getFilteredDetail();
    renderDetailTable(filteredDetail);
}

function doDetailReset() {
    document.getElementById('dFilterSupplier').value = '';

var thinBorder = { style:'thin', color:{rgb:'FFB2B2B2'} };
var allBorders = { top:thinBorder, bottom:thinBorder, left:thinBorder, right:thinBorder };
var headerFont = { bold:true, sz:10, name:'Arial', color:{rgb:'FF333333'} };
var headerFill = { fgColor:{rgb:'FFF2F2F2'} };
var headerAlign = { horizontal:'center', vertical:'center', wrapText:true };
var cellAlign = { horizontal:'center', vertical:'center' };
var dataFont = { sz:9, name:'Arial', color:{rgb:'FF333333'} };

function applyCellStyle(ws, ref, style) {
    if (!ws[ref]) return;
    ws[ref].s = style;
}
function styleRange(ws, rowIdx, colStart, colEnd, style) {
    for (var c = colStart; c <= colEnd; c++) {
        applyCellStyle(ws, XLSX.utils.encode_cell({r:rowIdx, c:c}), style);
    }
}
function downloadWorkbook(wb, filename) {
    var wbout = XLSX.write(wb, { bookType:'xlsx', type:'array', cellStyles:true });
    var blob = new Blob([wbout], { type:'application/octet-stream' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}

function exportSummary() {
    var data = filteredSummary;
    var startVal = document.getElementById('sFilterDateStart').value || '';
    var endVal = document.getElementById('sFilterDateEnd').value || '';
    var periodLabel = startVal + ' ~ ' + endVal;

    // 按供应商分组计算分摊比例
    var supplierTotals = {};
    for (var i = 0; i < data.length; i++) {
        var s = data[i].supplier;
        if (!supplierTotals[s]) supplierTotals[s] = 0;
        supplierTotals[s] += data[i].billCount;
    }

    var aoa = [];
    aoa.push(['外数平台 - 账单汇总']);
    aoa.push(['周期：' + periodLabel + '  导出时间：' + new Date().toLocaleString('zh-CN')]);
    aoa.push([]);
    aoa.push(['供应商', '租户', '总查询量', '命中缓存数', '计费次数', '分摊比例', '费用']);

    var totQuery = 0, totCache = 0, totBill = 0, totCost = 0;
    for (var i = 0; i < data.length; i++) {
        var r = data[i];
        var ratio = supplierTotals[r.supplier] > 0 ? r.billCount / supplierTotals[r.supplier] : 0;
        var unitCost = supplierUnitCost[r.supplier] || 0;
        var cost = r.billCount * unitCost;
        totQuery += r.totalQuery;
        totCache += r.cacheHit;
        totBill += r.billCount;
        totCost += cost;
        aoa.push([r.supplier, r.tenant, r.totalQuery, r.cacheHit, r.billCount, (ratio * 100).toFixed(1) + '%', cost]);
    }
    // 合计行
    aoa.push(['合计', '', totQuery, totCache, totBill, '', totCost]);

    var colCount = 7;
    var ws = XLSX.utils.aoa_to_sheet(aoa);
    ws['!merges'] = [
        { s:{r:0,c:0}, e:{r:0,c:colCount - 1} },
        { s:{r:1,c:0}, e:{r:1,c:colCount - 1} }
    ];
    ws['!cols'] = [{wch:12},{wch:8},{wch:12},{wch:14},{wch:12},{wch:12},{wch:14}];

    // 样式
    applyCellStyle(ws, 'A1', { font:{bold:true, sz:13, name:'Arial', color:{rgb:'FF1f2f3d'}}, alignment:{horizontal:'center', vertical:'center'} });
    applyCellStyle(ws, 'A2', { font:{sz:9, name:'Arial', color:{rgb:'FF666666'}}, alignment:{vertical:'center'} });
    styleRange(ws, 3, 0, colCount - 1, { font:headerFont, fill:headerFill, alignment:headerAlign, border:allBorders });
    var totalRowStyle = { font:{bold:true, sz:10, name:'Arial', color:{rgb:'FF333333'}}, fill:{fgColor:{rgb:'FFFAFBFC'}}, alignment:cellAlign, border:allBorders };
    for (var di = 0; di < data.length; di++) {
        styleRange(ws, 4 + di, 0, colCount - 1, { font:dataFont, alignment:cellAlign, border:allBorders });
    }
    styleRange(ws, 4 + data.length, 0, colCount - 1, totalRowStyle);

    var wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '账单汇总');
    downloadWorkbook(wb, '账单汇总_' + new Date().toISOString().slice(0, 10) + '.xlsx');

    var totalRowStyle = { font:{bold:true, sz:10, name:'Arial', color:{rgb:'FF333333'}}, fill:{fgColor:{rgb:'FFFAFBFC'}}, alignment:cellAlign, border:allBorders };
    for (var di = 0; di < data.length; di++) {
        styleRange(ws, 4 + di, 0, colCount - 1, { font:dataFont, alignment:cellAlign, border:allBorders });
    }
    styleRange(ws, 4 + data.length, 0, colCount - 1, totalRowStyle);

    var wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '账单明细');
    downloadWorkbook(wb, '账单明细_' + new Date().toISOString().slice(0, 10) + '.xlsx');
}

<!-- 侧栏/顶栏交互 -->
<script>
document.addEventListener('click', function(e) {
    var link = e.target.closest('a.sidebar-item, a.menu-item');
    if (link && link.getAttribute('href') === 'index.html') {
        e.preventDefault();
        document.querySelectorAll('.sidebar-item, .menu-item').forEach(function(m) { m.classList.remove('active'); });
        link.classList.add('active');
    }
});
document.addEventListener('click', function(e) {
    var navTab = e.target.closest('a.nav-tab');
    if (navTab) {
        var navKeys = {'数据门户':'portal','外源管理':'external','服务管理':'service','监控统计':'monitor','运营管理':'operation','个人中心':'personal','系统管理':'system'};
        var text = navTab.textContent.trim();
        if (navKeys[text]) localStorage.setItem('_navMenu', navKeys[text]);
    }
});
</script>
