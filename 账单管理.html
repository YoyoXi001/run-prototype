<script>
    // ========== Toast ==========
    function showToast(message, type) {
        type = type || 'info';
        var icons = { success: 'el-icon-circle-check', error: 'el-icon-circle-close', warning: 'el-icon-warning', info: 'el-icon-info' };
        var container = document.getElementById('toastContainer');
        var toast = document.createElement('div');
        toast.className = 'toast ' + type;
        toast.innerHTML = '<i class="' + (icons[type] || icons.info) + '"></i><span>' + message + '</span>';
        container.appendChild(toast);
        setTimeout(function() { if (toast.parentNode) toast.parentNode.removeChild(toast); }, 2500);
    }

    // ========== 日期工具 ==========
    function formatDate(d) {
        var y = d.getFullYear();
        var m = ('0' + (d.getMonth() + 1)).slice(-2);
        var day = ('0' + d.getDate()).slice(-2);
        return y + '-' + m + '-' + day;
    }

    function daysBetween(d1, d2) {
        var t1 = new Date(d1).getTime();
        var t2 = new Date(d2).getTime();
        return Math.abs(t2 - t1) / (1000 * 60 * 60 * 24);
    }

    // ========== 账单周期选择 ==========
    function onPeriodTypeChange() {
        var type = document.getElementById('filterPeriodType').value;
        var sel = document.getElementById('filterPeriodValue');
        var customInline = document.getElementById('customDateInline');
        sel.innerHTML = '';
        var now = new Date();
        var y = now.getFullYear();
        var m = now.getMonth();

        if (type === 'custom') {
            // 自定义模式：隐藏周期下拉，显示日期选择器（同行）
            sel.style.display = 'none';
            customInline.classList.add('show');
            // 默认当月
            var monthStart = new Date(y, m, 1);
            var monthEnd = new Date(y, m + 1, 0);
            if (!document.getElementById('customDateStart')._flatpickr) {
                flatpickr('#customDateStart', { dateFormat: 'Y-m-d', locale: 'zh', allowInput: true, defaultDate: formatDate(monthStart) });
                flatpickr('#customDateEnd', { dateFormat: 'Y-m-d', locale: 'zh', allowInput: true, defaultDate: formatDate(monthEnd) });
            } else {
                document.getElementById('customDateStart')._flatpickr.setDate(formatDate(monthStart));
                document.getElementById('customDateEnd')._flatpickr.setDate(formatDate(monthEnd));
            }
            return;
        }

        // 非自定义：显示下拉，隐藏日期选择器
        sel.style.display = '';
        customInline.classList.remove('show');

        if (type === 'month') {
            for (var i = 0; i < 12; i++) {
                var d = new Date(y, m - i, 1);
                var startY = d.getFullYear();
                var startM = d.getMonth();
                var start = formatDate(new Date(startY, startM, 1));
                var end = formatDate(new Date(startY, startM + 1, 0));
                var label = startY + '年' + (startM + 1) + '月';
                var opt = document.createElement('option');
                opt.value = start + '|' + end;
                opt.textContent = label;
                sel.appendChild(opt);
            }
        } else if (type === 'quarter') {
            var currentQ = Math.floor(m / 3);
            for (var i = 0; i < 8; i++) {
                var qOffset = currentQ - i;
                var qYear = y + Math.floor(qOffset / 4);
                var q = ((qOffset % 4) + 4) % 4;
                var start = formatDate(new Date(qYear, q * 3, 1));
                var end = formatDate(new Date(qYear, q * 3 + 3, 0));
                var label = qYear + '年Q' + (q + 1);
                var opt = document.createElement('option');
                opt.value = start + '|' + end;
                opt.textContent = label;
                sel.appendChild(opt);
            }
        } else if (type === 'year') {
            for (var i = 0; i < 5; i++) {
                var yr = y - i;
                var start = yr + '-01-01';
                var end = yr + '-12-31';
                var label = yr + '年';
                var opt = document.createElement('option');
                opt.value = start + '|' + end;
                opt.textContent = label;
                sel.appendChild(opt);
            }
        }
    }

    // 获取当前选择的日期范围
    function getDateRange() {
        var type = document.getElementById('filterPeriodType').value;
        if (type === 'custom') {
            return {

                end: document.getElementById('customDateEnd').value || ''
            };
        }
        var val = document.getElementById('filterPeriodValue').value;
        if (val) {
            var parts = val.split('|');
            return { start: parts[0], end: parts[1] };
        }
        return { start: '', end: '' };
    }

    // ========== 按供应商汇总 ==========
    function aggregateBySupplier(records) {
        var map = {};
        var order = [];
        for (var i = 0; i < records.length; i++) {
            var r = records[i];
            if (!map[r.supplier]) {
                map[r.supplier] = { supplier: r.supplier, totalQueries: 0, billableQueries: 0, cacheHits: 0, totalFee: 0 };
                order.push(r.supplier);
            }
            map[r.supplier].totalQueries += r.totalQueries;
            map[r.supplier].billableQueries += r.billableQueries;
            map[r.supplier].cacheHits += r.cacheHits;
            map[r.supplier].totalFee += r.fee;
        }
        var result = [];
        for (var j = 0; j < order.length; j++) {
            result.push(map[order[j]]);
        }
        return result;
    }

    // ========== 分页 ==========
    var currentPage = 1, pageSize = 10;
    var filteredList = [];

    function renderTable() {
        var supplier = document.getElementById('filterSupplier').value;
        var records = detailRecords;
        if (supplier) {
            records = records.filter(function(r) { return r.supplier === supplier; });
        }
        filteredList = aggregateBySupplier(records);

        var total = Math.ceil(filteredList.length / pageSize) || 1;
        if (currentPage > total) currentPage = total;
        var startIdx = (currentPage - 1) * pageSize;
        var pageData = filteredList.slice(startIdx, startIdx + pageSize);

        var tbody = document.getElementById('tableBody');
        if (pageData.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" style="padding:40px 0;color:#999;">暂无数据</td></tr>';
            updatePagination(0, 1);
            return;
        }

        var html = '';
        var startIdx = (currentPage - 1) * pageSize;
        for (var i = 0; i < pageData.length; i++) {
            var r = pageData[i];
            var range = getDateRange();
            var globalIndex = startIdx + i;
            var role = (globalIndex === 1) ? 'consumer' : 'publisher';
            var detailUrl = '账单明细.html?supplier=' + encodeURIComponent(r.supplier)
                + '&periodType=' + document.getElementById('filterPeriodType').value
                + '&startDate=' + encodeURIComponent(range.start)
                + '&endDate=' + encodeURIComponent(range.end)
                + '&role=' + role
                + '&displayTenant=' + encodeURIComponent('资产');
            html += '<tr>'
                + '<td>' + r.supplier + '</td>'
                + '<td>' + r.totalQueries.toLocaleString() + '</td>'
                + '<td>' + r.billableQueries.toLocaleString() + '</td>'
                + '<td>' + r.cacheHits.toLocaleString() + '</td>'
                + '<td class="amount-text">¥' + r.totalFee.toLocaleString('zh-CN', {minimumFractionDigits:2, maximumFractionDigits:2}) + '</td>'
                + '<td><a class="action-link" href="' + detailUrl + '">查看明细</a></td>'
                + '</tr>';
        }
        tbody.innerHTML = html;
        updatePagination(filteredList.length, total);
    }

    function updatePagination(totalCount, totalPages) {
        var cp = currentPage;
        var container = document.getElementById('paginationArea');
        var html = '<span class="total-text">共 ' + totalCount + ' 条</span>';
        html += '<button class="page-btn" ' + (cp===1?'disabled':'') + ' onclick="changePage(' + (cp-1) + ')"><i class="el-icon-arrow-left"></i></button>';
        var start = Math.max(1, cp - 2), end = Math.min(totalPages, cp + 2);
        for (var i = start; i <= end; i++) {
            html += '<span class="page-number ' + (i===cp?'active':'') + '" onclick="changePage(' + i + ')">' + i + '</span>';
        }
        html += '<button class="page-btn" ' + (cp===totalPages?'disabled':'') + ' onclick="changePage(' + (cp+1) + ')"><i class="el-icon-arrow-right"></i></button>';
        html += '<select class="page-size-select" onchange="changePageSize(this.value)">'
            + '<option value="10" ' + (pageSize===10?'selected':'') + '>10条/页</option>'
            + '<option value="20" ' + (pageSize===20?'selected':'') + '>20条/页</option>'
            + '<option value="50" ' + (pageSize===50?'selected':'') + '>50条/页</option>'
            + '</select>';
        html += '<div class="jump-section"><span>前往</span><input type="number" id="jumpPageInput" min="1" max="' + totalPages + '" value="' + cp + '" onkeydown="if(event.keyCode===13) jumpPage()"><span>页</span></div>';
        container.innerHTML = html;
    }

    function changePage(page) { currentPage = page; renderTable(); }
    function changePageSize(size) { pageSize = parseInt(size); currentPage = 1; renderTable(); }
    function jumpPage() {
        var p = parseInt(document.getElementById('jumpPageInput').value);
        var total = Math.ceil(filteredList.length / pageSize) || 1;
        if (p >= 1 && p <= total) { currentPage = p; renderTable(); }
    }

    // ========== 查询 & 重置 ==========
    function doQuery() {
        var type = document.getElementById('filterPeriodType').value;
        if (type === 'custom') {
            var s = document.getElementById('customDateStart').value;
            var e = document.getElementById('customDateEnd').value;
            if (!s || !e) { showToast('请选择开始日期和结束日期', 'warning'); return; }
            if (new Date(s) > new Date(e)) { showToast('开始日期不能晚于结束日期', 'warning'); return; }
            if (daysBetween(s, e) > 730) { showToast('自定义时间范围不能超过2年', 'warning'); return; }
        }
        currentPage = 1;
        renderTable();
    }

    function doReset() {
        document.getElementById('filterSupplier').value = '';
        document.getElementById('filterPeriodType').value = 'month';
        onPeriodTypeChange();
        currentPage = 1;
        renderTable();
    }

    // 初始渲染
    renderTable();
</script>
