    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {

            color: #666666;

        /* 顶部导航栏 */
        .top-nav {
            background: linear-gradient(135deg, #84B9FD, #E1EDFB);
            box-shadow: 0 1px 4px rgba(0, 21, 41, 0.08);
            position: sticky; top: 0; z-index: 100;
            height: 80px; display: flex; align-items: center; justify-content: space-between;

        .logo-area { width: 265px; height: 50px; display: flex; align-items: center; gap: 12px; }
        .logo-text { display: flex; flex-direction: column; }
        .logo-title { font-size: 18px; font-weight: 700; color: #1f2f3d; font-family: 'Source Han Sans SC', 'Source Sans Pro', sans-serif; letter-spacing: 1px; line-height: 1.3; }
        .logo-sub { font-size: 10px; color: #5a6e8c; margin-top: 2px; }
        .nav-tabs { display: flex; gap: 48px; position: absolute; left: 320px; }
        .nav-tab { cursor: pointer; font-size: 18px; font-family: 'Source Han Sans SC', 'Source Sans Pro', sans-serif; color: #333333; position: relative; transition: 0.3s; font-weight: 400; padding-bottom: 4px; }
        .nav-tab:hover { color: #1152c5; }
        .nav-tab.active { color: #1152c5; font-weight: 700; }
        .nav-tab.active::after { content: ''; position: absolute; bottom: -8px; left: 0; right: 0; height: 2px; background: #1152c5; border-radius: 2px; }
        .user-area { display: flex; align-items: center; gap: 16px; position: relative; }
        .message-icon-wrapper { position: relative; cursor: pointer; display: flex; align-items: center; }
        .message-icon { font-size: 20px; color: #5a5e66; }
        .message-icon:hover { color: #1152c5; }
        .unread-badge-icon { position: absolute; top: -8px; right: -12px; background: #f5222d; color: #fff; font-size: 11px; font-weight: 500; padding: 2px 5px; border-radius: 20px; min-width: 18px; text-align: center; border: 1px solid #fff; line-height: 1.2; }
        .tenant-info { font-size: 14px; color: #5a5e66; font-family: 'Source Han Sans SC', sans-serif; }
        .tenant-name { font-weight: 500; color: #1f2f3d; }
        .avatar { width: 33px; height: 33px; background: #fcb53e; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 600; font-size: 15px; cursor: pointer; font-family: 'Source Han Sans SC', sans-serif; }

        /* 左侧菜单 */
        .side-menu { width: 240px; background: #fff; border-right: 0; position: fixed; left: 0; top: 80px; bottom: 0; overflow-y: auto; padding: 16px 0; box-shadow: 1px 0 4px rgba(0, 0, 0, 0.02); }
        .menu-item { display: flex; align-items: center; gap: 12px; width: 240px; height: 48px; padding: 0 20px; margin-bottom: 10px; cursor: pointer; font-family: 'Source Han Sans SC', 'Source Sans Pro', sans-serif; font-size: 16px; color: #333333; transition: 0.3s; background: transparent; border-radius: 0; text-decoration: none; }
        .menu-item:last-child { margin-bottom: 0; }
        .menu-item:hover { background: #fef5ec; }
        .menu-item.active { background: linear-gradient(270deg, #fefdfb, #fef5ec); color: #f89d34; border-right: 2px solid #f89d34; }
        .menu-item i { font-size: 18px; width: 22px; }

        /* 右侧内容区域 - flex布局 */
        .main-content { margin-left: 240px; padding: 8px 16px 16px 16px; min-height: calc(100vh - 80px); background: #F5F7FA; display: flex; flex-direction: column; }
        .content-card { background: transparent; border-radius: 0; padding: 0; box-shadow: none; flex: 1; display: flex; flex-direction: column; }
        .forecast-layout { flex: 1; display: flex; flex-direction: column; }
        .forecast-white-card { flex: 1; display: flex; flex-direction: column; background: #fff; border-radius: 6px; padding: 16px; padding-bottom: 24px; margin-bottom: 0; box-shadow: 0 1px 2px rgba(0,0,0,0.03); min-height: 0; }
        .flex-table-container { flex: 1; display: flex; flex-direction: column; min-height: 0; }
        .breadcrumb { padding: 0; margin: 0 0 8px 0; background: transparent; font-size: 14px; color: #666; border: none; }
        .breadcrumb .separator { margin: 0 8px; color: #666; }
        .breadcrumb .current { color: #666; font-weight: normal; }

        /* 筛选栏 */
        .filter-section { background: #fff; border: 1px solid #e4e7ed; border-radius: 6px; margin-bottom: 16px; }
        .filter-bar { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; padding: 16px; }
        .filter-left { display: flex; flex-wrap: wrap; align-items: center; gap: 16px; }
        .filter-item { display: flex; align-items: center; gap: 8px; }
        .filter-item label { font-size: 14px; font-weight: 500; color: #666666; white-space: nowrap; }
        .filter-item input, .filter-item select { width: 222px; height: 32px; padding: 0 8px; border: 1px solid #dcdfe6; border-radius: 4px; font-size: 14px; outline: none; color: #333333; }
        .filter-item input:focus, .filter-item select:focus { border-color: #f89d34; }
        .filter-right { display: flex; gap: 12px; }
        .btn-primary { background: #f89d34; color: #fff; border: 1px solid #f89d34; padding: 8px 20px; border-radius: 4px; font-size: 14px; cursor: pointer; }
        .btn-primary:hover { background: #e88a2e; }
        .btn-default { background: #fff; border: 1px solid #dcdfe6; padding: 8px 20px; border-radius: 4px; font-size: 14px; cursor: pointer; color: #666666; }
        .btn-default:hover { border-color: #f89d34; color: #f89d34; }
        .btn-add { background: #fff; color: #f89d34; border: 1px solid #f89d34; padding: 0; border-radius: 4px; font-size: 14px; cursor: pointer; transition: all 0.2s; width: 64px; height: 32px; line-height: 32px; }
        .btn-add:hover { background: #fef5ec; }

        /* 内容区域 */
        .action-bar { padding: 0 0 10px 0; display: flex; justify-content: flex-start; }
        .table-container { border: 1px solid #ebeef5; border-radius: 2px; overflow-x: auto; overflow-y: auto; padding: 0; max-height: 460px; }
        .data-table { width: 100%; border-collapse: collapse; font-size: 14px; }
        .data-table th { padding: 0 12px; height: 48px; background: #F5F7FA; font-weight: 600; color: #777777; font-size: 14px; border-bottom: 1px solid #ebeef5; border-right: 1px solid #ebeef5; text-align: center; white-space: nowrap; position: sticky; top: 0; z-index: 1; }
        .data-table td { padding: 0 12px; height: 40px; border-bottom: 1px solid #ebeef5; border-right: 1px solid #ebeef5; color: #666666; text-align: center; vertical-align: middle; }
        .data-table th:last-child, .data-table td:last-child { border-right: none; }
        .data-table tr:last-child td { border-bottom: none; }
        .data-table tr:hover td { background: #f8fafc; }

        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; }
        .status-enabled { background: #e6f7e6; color: #52c41a; }
        .status-disabled { background: #ffe7e7; color: #f5222d; }

        .action-link { color: #0d6cff; cursor: pointer; text-decoration: none; font-size: 14px; margin: 0 6px; display: inline-block; }
        .action-link:hover { text-decoration: underline; }
        .action-link.danger { color: #f5222d; }

        /* 分页 */
        .pagination { padding: 8px 0 0 0; display: flex; justify-content: flex-end; align-items: center; gap: 8px; font-size: 13px; color: #333333; }
        .pagination .total-text { margin-right: 16px; color: #666666; }
        .col-period { white-space: nowrap; font-size: 12px; }
        .pagination .page-btn { min-width: 32px; height: 32px; background: transparent; border: none; cursor: pointer; font-size: 14px; color: #666666; display: inline-flex; align-items: center; justify-content: center; }
        .pagination .page-btn:disabled { cursor: not-allowed; opacity: 0.5; }
        .pagination .page-btn:hover:not(:disabled) { color: #f89d34; }
        .pagination .page-number { min-width: 32px; height: 32px; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; font-size: 14px; color: #666666; background: transparent; border: none; }
        .pagination .page-number.active { color: #f89d34; font-weight: 600; }
        .pagination .page-number:hover:not(.active) { color: #f89d34; }
        .pagination .page-size-select { padding: 5px 8px; border: 1px solid #dcdfe6; border-radius: 4px; font-size: 13px; color: #333333; background: #fff; cursor: pointer; margin-left: 16px; }
        .pagination .jump-section { margin-left: 16px; display: inline-flex; align-items: center; gap: 6px; }
        .pagination .jump-section input { width: 60px; height: 32px; padding: 0 8px; border: 1px solid #dcdfe6; border-radius: 4px; text-align: center; font-size: 13px; }

        /* 弹窗 */
        .modal-mask { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 2000; display: flex; align-items: center; justify-content: center; visibility: hidden; opacity: 0; transition: 0.2s; }
        .modal-mask.active { visibility: visible; opacity: 1; }
        .edit-modal { background: #fff; width: 720px; max-width: 90%; border-radius: 2px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); overflow: hidden; max-height: 85vh; display: flex; flex-direction: column; }
        .edit-modal .modal-header { padding: 16px 20px; border-bottom: 0; display: flex; align-items: center; justify-content: space-between; }
        .edit-modal .modal-title { font-size: 18px; font-weight: 600; color: #333; }
        .edit-modal .modal-close { font-size: 20px; color: #999; cursor: pointer; background: none; border: none; line-height: 1; }
        .edit-modal .modal-close:hover { color: #f5222d; }
        .modal-body { padding: 20px; overflow-y: auto; flex: 1; }
        .edit-modal .modal-footer { padding: 12px 20px; border-top: 0; display: flex; justify-content: center; gap: 12px; }
        .btn-save { background: #f89d34; color: #fff; border: none; padding: 10px 28px; border-radius: 4px; font-size: 14px; cursor: pointer; }
        .btn-save:hover { background: #e68f2a; }
        .btn-cancel { background: #fff; color: #666; border: 1px solid #dcdfe6; padding: 10px 28px; border-radius: 4px; font-size: 14px; cursor: pointer; }
        .btn-cancel:hover { background: #f5f7fa; }

        /* 表单 */
        .form-row-horizontal { display: flex; align-items: flex-start; margin-bottom: 20px; }
        .form-row-horizontal label { width: 100px; text-align: right; padding-right: 12px; line-height: 36px; font-size: 14px; font-weight: 500; color: #666; flex-shrink: 0; margin-right: 12px; }
        .edit-modal label .required { color: #f5222d; margin-left: 2px; }
        .form-row-horizontal .form-control { flex: 1; }
        .form-row-horizontal .form-control input,
        .form-row-horizontal .form-control select,
        .form-row-horizontal .form-control textarea {
            width: 100%; height: 36px; padding: 0 12px; border: 1px solid #dcdfe6; border-radius: 4px; font-size: 14px; outline: none; color: #333;
        }
        .form-row-horizontal .form-control textarea { height: 80px; padding: 8px 12px; resize: vertical; }
        .form-row-horizontal .form-control input:focus,
        .form-row-horizontal .form-control select:focus,
        .form-row-horizontal .form-control textarea:focus { border-color: #f89d34; }

        .strategy-fields { background: #fafbfc; border: 1px solid #ebeef5; border-radius: 4px; padding: 16px; margin-top: 8px; }
        .strategy-fields .field-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .strategy-fields .field-row:last-child { margin-bottom: 0; }
        .strategy-fields .field-row label { width: 80px; text-align: right; font-size: 13px; color: #666; flex-shrink: 0; }
        .strategy-fields .field-row input,
        .strategy-fields .field-row select { width: 200px; height: 32px; padding: 0 8px; border: 1px solid #dcdfe6; border-radius: 4px; font-size: 13px; color: #333; outline: none; }
        .strategy-fields .field-row input:focus,
        .strategy-fields .field-row select:focus { border-color: #f89d34; }

        /* 阶梯表格 */
        .tier-table { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 13px; }
        .tier-table th { background: #F5F7FA; padding: 8px 12px; border: 1px solid #ebeef5; font-weight: 600; color: #777; text-align: center; }
        .tier-table td { padding: 8px 12px; border: 1px solid #ebeef5; text-align: center; }
        .tier-table input { width: 120px; height: 28px; padding: 0 6px; border: 1px solid #dcdfe6; border-radius: 4px; font-size: 13px; text-align: center; color: #333; outline: none; }
        .tier-table input:focus { border-color: #f89d34; }
        .btn-add-tier { background: #fff; color: #f89d34; border: 1px dashed #f89d34; padding: 4px 12px; border-radius: 4px; font-size: 12px; cursor: pointer; margin-top: 8px; }
        .btn-add-tier:hover { background: #fef5ec; }

        /* 价格单元格 */
        .price-cell { font-size: 12px; line-height: 1.6; color: #333; text-align: center; }

        /* 确认弹窗 */
        .confirm-mask { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 3000; display: none; align-items: center; justify-content: center; }
        .confirm-mask.show { display: flex; }
        .confirm-box { background: #fff; border-radius: 8px; width: 400px; padding: 24px; box-shadow: 0 4px 24px rgba(0,0,0,0.15); }
        .confirm-box .confirm-icon { font-size: 22px; color: #fa8c16; margin-right: 12px; }
        .confirm-box .confirm-title { font-size: 16px; font-weight: 600; color: #1f2f3d; margin-bottom: 12px; display: flex; align-items: center; }
        .confirm-box .confirm-msg { font-size: 14px; color: #666; margin-bottom: 24px; padding-left: 34px; }
        .confirm-box .confirm-actions { display: flex; justify-content: flex-end; gap: 12px; }

        /* 自定义多选下拉 */
        .multi-select-wrap { position: relative; }
        .multi-select-display {
            width: 100%; min-height: 36px; padding: 4px 30px 4px 8px; border: 1px solid #dcdfe6; border-radius: 4px;
            font-size: 14px; color: #333; cursor: pointer; background: #fff;
            display: flex; align-items: center; flex-wrap: nowrap; overflow: hidden; gap: 4px;
        }
        .multi-select-display:focus { border-color: #f89d34; outline: none; }
        .multi-select-display.disabled { background: #f5f7fa; color: #8c8f99; cursor: not-allowed; }
        .multi-select-placeholder { color: #c0c4cc; font-size: 14px; }
        .multi-select-arrow { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: #c0c4cc; font-size: 12px; pointer-events: none; }
        .multi-select-dropdown {
            position: absolute; top: 100%; left: 0; right: 0; background: #fff; border: 1px solid #dcdfe6;
            border-radius: 4px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); z-index: 100; max-height: 260px; overflow-y: auto; display: none;
        }
        .multi-select-dropdown.show { display: block; }
        .multi-select-option { display: flex; align-items: center; gap: 8px; padding: 5px 12px; cursor: pointer; font-size: 13px; color: #333; transition: background 0.15s; }
        .multi-select-option:hover { background: #f5f7fa; }
        .multi-select-option input[type="checkbox"] {
            position: absolute; opacity: 0; width: 0; height: 0; pointer-events: none;
        }
        .multi-select-option .cb-box {
            width: 14px; height: 14px; border: 1px solid #dcdfe6; border-radius: 2px; background: #fff;
            display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; cursor: pointer;
        }
        .multi-select-option .cb-box::after {
            content: ''; width: 4px; height: 8px; border: solid #fff; border-width: 0 1.5px 1.5px 0; transform: rotate(45deg) scale(0); transition: transform 0.12s; display: block; margin-top: -1px;
        }
        .multi-select-option input[type="checkbox"]:checked + .cb-box {
            background: #f89d34; border-color: #f89d34;
        }
        .multi-select-option input[type="checkbox"]:checked + .cb-box::after {
            transform: rotate(45deg) scale(1);
        }
        .multi-select-option label { flex: 1; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 20px; text-align: left; width: auto; padding: 0; margin: 0; font-weight: normal; font-size: 13px; color: #333; }
        .multi-select-option.unlimited-option { border-bottom: 1px solid #ebeef5; font-weight: 500; }
        .api-tag { display: inline-flex; align-items: center; gap: 4px; background: #f0f2f5; border-radius: 3px; padding: 2px 8px; font-size: 12px; color: #333; white-space: nowrap; flex-shrink: 0; }
        .api-tag .tag-close { cursor: pointer; color: #999; font-size: 14px; line-height: 1; }
        .api-tag .tag-close:hover { color: #f5222d; }
        .api-tag-more { display: inline-flex; align-items: center; background: #e8eaed; border-radius: 3px; padding: 2px 8px; font-size: 12px; color: #666; white-space: nowrap; flex-shrink: 0; }

        /* 表格API列省略 */
        .data-table td.cell-api { max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* 编号提示图标 */
        .code-info-icon { color: #c0c4cc; font-size: 14px; cursor: help; margin-left: 4px; vertical-align: middle; }
    </style>
</head>

            <!-- 筛选栏 -->
            <div class="filter-section">
                <div class="filter-bar">
                    <div class="filter-left">
                        <div class="filter-item">

                            <select id="filterSupplier">
                                <option value="">全部</option>
                                <option>天眼查</option>

                            </select>
                        </div>
                        <div class="filter-item">

                            <select id="filterApi">

                                <option>企业基本信息</option>
                                <option>司法风险</option>
                                <option>企业图谱</option>

<script>

    var apiAbbr = { '不限':'ALL', '企业基本信息':'QYJBXX', '股东信息':'GDXX', '变更记录':'BGJL', '司法风险':'SFXP', '企业图谱':'QYTP', '信用评分':'XYPF', '个人信用报告':'GRXYBG', '反欺诈评分':'FQZPF', '经营状况':'JYZK', '融资历史':'RZLS', '知识产权':'ZSCQ' };
    var modeAbbr = { perCall:'AC', volume:'BL', tiered:'JT' };
    var billingSeq = 1;

    function generateBillingCode(supplier, apis, mode) {
        var sc = supplierAbbr[supplier] || 'UNK';
        var mc = modeAbbr[mode] || 'XX';

        if (!apis || apis.length === 0 || apis[0] === '不限') {
            ac = 'ALL';
        } else {
            ac = apiAbbr[apis[0]] || 'API';
        }
        var seq = String(billingSeq++).padStart(3, '0');
        return 'JF-' + sc + '-' + ac + '-' + mc + '-' + seq;
    }

    // ========== 数据 ==========

          detail:{ tiers:[{from:'0',to:'30000',price:'1.8'},{from:'30001',to:'80000',price:'1.2'},{from:'80001',to:'',price:'0.8'}] } },
        { id:4, billingCode:'JF-API-QCC-QYTP-BL-004', sourceType:'api', supplier:'企查查', api:['企业图谱'], mode:'volume', priceText:'¥80,000/10万次<br>超额¥1.0/次', period:'2024-01-01 ~ 2024-12-31', status:'启用', creator:'金控-管理员', remark:'',

          detail:{ price:'0.8' } },
        { id:8, billingCode:'JF-API-TYC-JYZK-BL-008', sourceType:'api', supplier:'天眼查', api:['经营状况','知识产权','融资历史'], mode:'volume', priceText:'¥50,000/5万次<br>超额¥1.2/次', period:'2024-01-01 ~ 2024-12-31', status:'停用', creator:'金控-管理员', remark:'',
          detail:{ count:'50000', fee:'50000', overprice:'1.2' } }
    ];

    var nextId = 9;
    billingSeq = 9; // 续接已有编码序号
    var editingId = null;
    var confirmCallback = null;
    var isViewMode = false;

    // ========== 分页状态 ==========
    var currentPage = 1;
    var pageSize = 10;
    var filteredData = [];

    // ========== 初始化 ==========
    flatpickr("#editDateStart", { dateFormat:"Y-m-d", locale:"zh", allowInput:true });
    flatpickr("#editDateEnd", { dateFormat:"Y-m-d", locale:"zh", allowInput:true });

    // ========== API多选组件 ==========
    var editApiSelected = []; // 当前选中的API列表

    function initApiMultiSelect() {
        var display = document.getElementById('editApiDisplay');
        var dropdown = document.getElementById('editApiDropdown');
        var checkboxes = dropdown.querySelectorAll('input[type="checkbox"]');

        // 点击展示区切换下拉
        display.addEventListener('click', function(e) {
            if (this.classList.contains('disabled')) return;
            e.stopPropagation();
            dropdown.classList.toggle('show');
        });

        // 点击选项行切换 checkbox（因为原生 checkbox 已隐藏）
        var options = dropdown.querySelectorAll('.multi-select-option');
        for (var o = 0; o < options.length; o++) {
            (function(option) {
                option.addEventListener('click', function(e) {
                    if (e.target.tagName === 'INPUT') return; // 避免重复
                    var cb = option.querySelector('input[type="checkbox"]');
                    if (cb) {
                        cb.checked = !cb.checked;
                        cb.dispatchEvent(new Event('change'));
                    }
                });
            })(options[o]);
        }

        // checkbox change 事件处理
        for (var i = 0; i < checkboxes.length; i++) {
            checkboxes[i].addEventListener('change', function() {
                var val = this.value;
                var isUnlimited = (val === '不限');

                if (isUnlimited) {
                    if (this.checked) {
                        for (var j = 0; j < checkboxes.length; j++) {
                            if (checkboxes[j] !== this) checkboxes[j].checked = false;
                        }
                        editApiSelected = ['不限'];
                    } else {
                        editApiSelected = [];
                    }
                } else {
                    if (this.checked) {
                        var allCb = document.getElementById('apiOpt_all');
                        if (allCb) allCb.checked = false;
                        var idx = editApiSelected.indexOf('不限');
                        if (idx > -1) editApiSelected.splice(idx, 1);
                        if (editApiSelected.indexOf(val) === -1) {
                            editApiSelected.push(val);
                        }
                    } else {
                        var idx = editApiSelected.indexOf(val);
                        if (idx > -1) editApiSelected.splice(idx, 1);
                    }
                }
                updateApiDisplay();
            });
        }

        // 点击外部关闭
        document.addEventListener('click', function(e) {
            var wrap = document.getElementById('editApiWrap');
            if (wrap && !wrap.contains(e.target)) {
                dropdown.classList.remove('show');
            }
        });
    }

    function updateApiDisplay() {
        var display = document.getElementById('editApiDisplay');
        var placeholder = document.getElementById('editApiPlaceholder');

        // 移除旧标签
        var oldTags = display.querySelectorAll('.api-tag, .api-tag-more');
        for (var t = 0; t < oldTags.length; t++) oldTags[t].parentNode.removeChild(oldTags[t]);

        if (editApiSelected.length === 0) {
            placeholder.style.display = '';
            return;
        }
        placeholder.style.display = 'none';

        // 计算可显示的最大标签数
        var displayWidth = display.offsetWidth - 40; // 留出箭头和间距空间
        var usedWidth = 0;
        var shownCount = 0;

        for (var i = 0; i < editApiSelected.length; i++) {
            var tag = document.createElement('span');
            tag.className = 'api-tag';
            var textSpan = document.createElement('span');
            textSpan.textContent = editApiSelected[i];
            tag.appendChild(textSpan);

            if (!display.classList.contains('disabled')) {
                var closeSpan = document.createElement('span');
                closeSpan.className = 'tag-close';
                closeSpan.innerHTML = '×';
                closeSpan.setAttribute('data-val', editApiSelected[i]);
                closeSpan.addEventListener('click', function(e) {
                    e.stopPropagation();
                    deselectApi(this.getAttribute('data-val'));
                });
                tag.appendChild(closeSpan);
            }

            // 临时添加以测量宽度
            tag.style.visibility = 'hidden';
            display.appendChild(tag);
            var tagWidth = tag.offsetWidth + 4; // 含gap
            display.removeChild(tag);
            tag.style.visibility = '';

            if (usedWidth + tagWidth > displayWidth && i > 0) {
                // 放不下，显示 "+N"
                var remainCount = editApiSelected.length - i;
                var moreTag = document.createElement('span');
                moreTag.className = 'api-tag-more';
                moreTag.textContent = '+' + remainCount;
                display.appendChild(moreTag);
                break;
            }

            display.appendChild(tag);
            usedWidth += tagWidth;
            shownCount++;
        }
    }

    function deselectApi(val) {
        var idx = editApiSelected.indexOf(val);
        if (idx > -1) editApiSelected.splice(idx, 1);
        // 取消对应checkbox
        var checkboxes = document.querySelectorAll('#editApiDropdown input[type="checkbox"]');
        for (var i = 0; i < checkboxes.length; i++) {
            if (checkboxes[i].value === val) checkboxes[i].checked = false;
        }
        updateApiDisplay();
    }

    function setApiValues(arr) {
        editApiSelected = arr ? arr.slice() : [];
        var checkboxes = document.querySelectorAll('#editApiDropdown input[type="checkbox"]');
        for (var i = 0; i < checkboxes.length; i++) {
            checkboxes[i].checked = editApiSelected.indexOf(checkboxes[i].value) > -1;
        }
        updateApiDisplay();
    }

    function resetApiValues() {
        editApiSelected = [];
        var checkboxes = document.querySelectorAll('#editApiDropdown input[type="checkbox"]');
        for (var i = 0; i < checkboxes.length; i++) checkboxes[i].checked = false;
        var placeholder = document.getElementById('editApiPlaceholder');
        if (placeholder) placeholder.style.display = '';
        var oldTags = document.querySelectorAll('#editApiDisplay .api-tag, #editApiDisplay .api-tag-more');
        for (var t = 0; t < oldTags.length; t++) oldTags[t].parentNode.removeChild(oldTags[t]);
    }

    initApiMultiSelect();

    doQuery();

    // ========== 渲染表格（分页 + 序号） ==========
    function renderTable(data) {
        filteredData = data;
        var total = data.length;
        var totalPages = Math.ceil(total / pageSize) || 1;
        if (currentPage < 1) currentPage = 1;
        if (currentPage > totalPages) currentPage = totalPages;

        var start = (currentPage - 1) * pageSize;
        var end = Math.min(start + pageSize, total);
        var pageData = data.slice(start, end);

        var tbody = document.getElementById('billingTableBody');
        if (pageData.length === 0) {
            tbody.innerHTML = '<tr><td colspan="9" style="padding:40px 0;color:#999;">暂无数据</td></tr>';
        } else {
            var html = '';
            for (var i = 0; i < pageData.length; i++) {
                var r = pageData[i];
                var statusClass = r.status === '启用' ? 'status-enabled' : 'status-disabled';
                var toggleText = r.status === '启用' ? '停用' : '启用';
                var toggleClass = r.status === '启用' ? '' : ' danger';

                // 编号：优先使用计费编码
                var codeDisplay = r.billingCode || String(start + i + 1);

                // API显示：支持数组
                var apiText;
                if (Array.isArray(r.api)) {
                    if (r.api.length === 0) apiText = '';
                    else if (r.api[0] === '不限') apiText = '不限';
                    else if (r.api.length === 1) apiText = r.api[0];
                    else apiText = r.api[0] + ' 等' + r.api.length + '项';
                } else {
                    apiText = r.api || '';
                }

                html += '<tr>'
                    + '<td title="' + codeDisplay + '">' + codeDisplay + '</td>'
                    + '<td>' + r.supplier + '</td>'
                    + '<td class="cell-api" title="' + (Array.isArray(r.api) ? r.api.join('、') : (r.api || '')) + '">' + apiText + '</td>'
                    + '<td>' + modeNames[r.mode] + '</td>'
                    + '<td class="price-cell">' + r.priceText + '</td>'
                    + '<td class="col-period">' + r.period + '</td>'
                    + '<td><span class="status-badge ' + statusClass + '">' + r.status + '</span></td>'
                    + '<td>' + r.creator + '</td>'
                    + '<td>'
                    + '<a class="action-link" onclick="openEditModal(' + r.id + ')">编辑</a>'
                    + '<a class="action-link" onclick="openViewModal(' + r.id + ')">查看</a>'
                    + '<a class="action-link' + toggleClass + '" onclick="toggleStatus(' + r.id + ')">' + toggleText + '</a>'
                    + '<a class="action-link danger" onclick="deleteRecord(' + r.id + ')">删除</a>'
                    + '</td></tr>';
            }
            tbody.innerHTML = html;
        }
        renderPagination(total, totalPages);
    }

    // ========== 渲染分页栏 ==========
    function renderPagination(total, totalPages) {
        var html = '<span class="total-text">共 ' + total + ' 条</span>';
        html += '<button class="page-btn" ' + (currentPage === 1 ? 'disabled' : '') + ' onclick="goToPage(' + (currentPage - 1) + ')">&lt;</button>';

        // 计算页码范围（最多显示5个）
        var startP = Math.max(1, currentPage - 2);
        var endP = Math.min(totalPages, startP + 4);
        if (endP - startP < 4) startP = Math.max(1, endP - 4);
        for (var p = startP; p <= endP; p++) {
            html += '<span class="page-number' + (p === currentPage ? ' active' : '') + '" onclick="goToPage(' + p + ')">' + p + '</span>';
        }

        html += '<button class="page-btn" ' + (currentPage === totalPages ? 'disabled' : '') + ' onclick="goToPage(' + (currentPage + 1) + ')">&gt;</button>';

        html += '<select class="page-size-select" onchange="changePageSize(this.value)">';
        var sizes = [10, 20, 50];
        for (var i = 0; i < sizes.length; i++) {
            html += '<option' + (sizes[i] === pageSize ? ' selected' : '') + '>' + sizes[i] + '条/页</option>';
        }
        html += '</select>';

        html += '<div class="jump-section"><span>前往</span>'
            + '<input type="text" id="jumpPageInput" value="' + currentPage + '" onkeydown="if(event.key===\'Enter\') jumpToPage()">'
            + '<span>页</span></div>';

        document.getElementById('paginationWrap').innerHTML = html;
    }

    function goToPage(p) {
        currentPage = p;
        renderTable(filteredData);
    }

    function changePageSize(size) {
        pageSize = parseInt(size) || 10;
        currentPage = 1;
        renderTable(filteredData);
    }

    function jumpToPage() {
        var val = parseInt(document.getElementById('jumpPageInput').value);
        if (!isNaN(val) && val >= 1) {
            currentPage = val;
            renderTable(filteredData);
        }
    }

    // ========== 查询 & 重置 ==========
    function doQuery() {
        var supplier = document.getElementById('filterSupplier').value;
        var api = document.getElementById('filterApi').value;
        var status = document.getElementById('filterStatus').value;
        var filtered = allData.filter(function(r) {
            if (supplier && r.supplier !== supplier) return false;
            if (api) {
                if (api === '不限') {
                    if (!Array.isArray(r.api) || r.api.indexOf('不限') === -1) return false;
                } else {
                    if (Array.isArray(r.api)) {
                        if (r.api.indexOf('不限') === -1 && r.api.indexOf(api) === -1) return false;
                    } else if (r.api !== api) return false;
                }
            }
            if (status && r.status !== status) return false;
            return true;
        });
        renderTable(filtered);
    }

    function doReset() {
        document.getElementById('filterSupplier').value = '';
        document.getElementById('filterApi').value = '';
        document.getElementById('filterStatus').value = '';
        currentPage = 1;
        renderTable(allData);
    }

    // ========== 切换状态 ==========
    function toggleStatus(id) {
        var r = findRecord(id);
        if (!r) return;
        r.status = r.status === '启用' ? '停用' : '启用';
        renderTable(filteredData);
    }

    // ========== 删除 ==========
    function deleteRecord(id) {
        var r = findRecord(id);
        if (!r) return;
        showConfirm('确认删除', '确定要删除编号 ' + (r.billingCode || r.id) + ' 的计费规则吗？删除后不可恢复。', function() {
            for (var i = 0; i < allData.length; i++) {
                if (allData[i].id === id) { allData.splice(i, 1); break; }
            }
            doQuery();
        });
    }

    // ========== 新增 ==========
    function openAddModal() {
        editingId = null;
        isViewMode = false;
        document.getElementById('editModalTitle').textContent = '新增计费规则';
        restoreEditFooter();
        resetEditForm();
        document.getElementById('editModal').classList.add('active');
    }

    // ========== 编辑 ==========
    function openEditModal(id) {
        var r = findRecord(id);
        if (!r) return;
        editingId = id;
        isViewMode = false;
        document.getElementById('editModalTitle').textContent = '编辑计费规则';
        restoreEditFooter();
        resetEditForm();

        // 显示编号
        document.getElementById('billingCodeRow').style.display = 'flex';
        document.getElementById('editBillingCode').value = r.billingCode || '';

        // 填充计费模式下拉
        initStrategySelect();

        document.getElementById('editSupplier').value = r.supplier;
        // 设置API多选
        var apiArr = Array.isArray(r.api) ? r.api : (r.api ? [r.api] : []);
        setApiValues(apiArr);
        document.getElementById('strategySelect').value = r.mode;
        document.getElementById('editStatus').value = r.status;
        document.getElementById('editRemark').value = r.remark || '';

        var parts = r.period.split(' ~ ');
        document.getElementById('editDateStart')._flatpickr.setDate(parts[0] || '');
        document.getElementById('editDateEnd')._flatpickr.setDate(parts[1] || '');

        // 回填各模式字段
        if (r.mode === 'perCall' && r.detail) {
            var priceEl = document.getElementById('edit_perCall_price');
            if (priceEl) priceEl.value = r.detail.price || '';
        } else if (r.mode === 'volume' && r.detail) {
            document.getElementById('edit_volume_count').value = r.detail.count || '';
            document.getElementById('edit_volume_fee').value = r.detail.fee || '';
            document.getElementById('edit_volume_overprice').value = r.detail.overprice || '';
        } else if (r.mode === 'tiered' && r.detail && r.detail.tiers) {
            var ttb = document.querySelector('#tierTable tbody');
            ttb.innerHTML = '';
            tierCount = 0;
            for (var i = 0; i < r.detail.tiers.length; i++) {
                tierCount++;
                var t = r.detail.tiers[i];
                var tr = document.createElement('tr');
                tr.innerHTML = '<td>第' + tierCount + '档</td>'
                    + '<td><input type="text" value="' + (t.from||'') + '"></td>'
                    + '<td><input type="text" value="' + (t.to||'') + '"></td>'
                    + '<td><input type="text" value="' + (t.price||'') + '"></td>';
                ttb.appendChild(tr);
            }
        }

        onStrategyChange();
        document.getElementById('editModal').classList.add('active');
        setTimeout(updateApiDisplay, 50);
    }

    // ========== 保存 ==========
    function saveRecord() {
        var supplier = document.getElementById('editSupplier').value;
        var api = editApiSelected.length > 0 ? editApiSelected.slice() : [];
        var mode = document.getElementById('strategySelect').value;
        var status = document.getElementById('editStatus').value;
        var remark = document.getElementById('editRemark').value;
        var dateStart = document.getElementById('editDateStart').value;
        var dateEnd = document.getElementById('editDateEnd').value;

        if (!supplier || api.length === 0 || !mode) {
            alert('请填写必填项：供应商、API、计费模式');
            return;
        }

        var period = (dateStart || '') + ' ~ ' + (dateEnd || '');
        var priceText = '';
        var detail = {};

        // 收集各模式数据
        if (mode === 'perCall') {
            var p = document.getElementById('edit_perCall_price').value || '0';
            priceText = '¥' + p + '/次';
            detail = { price: p };
        } else if (mode === 'volume') {
            var cnt = document.getElementById('edit_volume_count').value || '0';
            var fee = document.getElementById('edit_volume_fee').value || '0';
            var op = document.getElementById('edit_volume_overprice').value || '0';
            priceText = '¥' + Number(fee).toLocaleString() + '/' + Number(cnt).toLocaleString() + '次<br>超额¥' + op + '/次';
            detail = { count: cnt, fee: fee, overprice: op };
        } else if (mode === 'tiered') {
            var tiers = [];
            var trows = document.querySelector('#tierTable tbody').querySelectorAll('tr');
            var tierTexts = [];
            for (var i = 0; i < trows.length; i++) {
                var ti = trows[i].querySelectorAll('input');
                var from = ti[0].value, to = ti[1].value, tp = ti[2].value;
                tiers.push({ from: from, to: to, price: tp });
                var label = to ? (Number(from).toLocaleString() + '-' + Number(to).toLocaleString() + '万') : ('>' + Number(from).toLocaleString());
                tierTexts.push(label + '¥' + tp);
            }
            priceText = tierTexts.join('<br>');
            detail = { tiers: tiers };
        }

        if (editingId) {
            // 编辑 - 保留原编号
            var r = findRecord(editingId);
            if (r) {
                r.supplier = supplier; r.api = api; r.mode = mode;
                r.priceText = priceText; r.period = period; r.status = status;
                r.remark = remark; r.detail = detail;
            }
        } else {
            // 新增 - 生成计费编码
            var billingCode = generateBillingCode(supplier, api, mode);
            allData.unshift({ id: nextId++, billingCode: billingCode, supplier: supplier, api: api, mode: mode, priceText: priceText, period: period, status: status, creator: '金控-管理员', remark: remark, detail: detail });
        }

        closeEditModal();
        if (editingId === null) {
            currentPage = 1;
        }
        doQuery();
    }

    // ========== 查看（复用编辑弹窗，只读模式） ==========
    function restoreEditFooter() {
        document.getElementById('editModalFooter').innerHTML =
            '<button class="btn-default" onclick="closeEditModal()">取消</button>' +
            '<button class="btn-primary" onclick="saveRecord()">保存</button>';
    }

    function setFormReadOnly(readonly) {
        var ids = ['editSupplier','strategySelect','editStatus','editRemark',
            'edit_perCall_price',
            'edit_volume_count','edit_volume_fee','edit_volume_overprice'];
        for (var i = 0; i < ids.length; i++) {
            var el = document.getElementById(ids[i]);
            if (el) el.disabled = readonly;
        }
        // 禁用/启用多选组件
        var display = document.getElementById('editApiDisplay');
        if (readonly) {
            display.classList.add('disabled');
        } else {
            display.classList.remove('disabled');
        }
        // 只读模式下隐藏标签关闭按钮
        var closeButtons = display.querySelectorAll('.tag-close');
        for (var c = 0; c < closeButtons.length; c++) {
            closeButtons[c].style.display = readonly ? 'none' : '';
        }
        // 禁用日期
        if (document.getElementById('editDateStart')._flatpickr)
            document.getElementById('editDateStart')._flatpickr._input.disabled = readonly;
        if (document.getElementById('editDateEnd')._flatpickr)
            document.getElementById('editDateEnd')._flatpickr._input.disabled = readonly;
        // 禁用阶梯表格和账户表格中的所有 input 和 button
        var tierInputs = document.querySelectorAll('#tierTable input');
        for (var i = 0; i < tierInputs.length; i++) tierInputs[i].disabled = readonly;
        var tierBtns = document.querySelectorAll('#fields-tiered .btn-add-tier');
        for (var i = 0; i < tierBtns.length; i++) tierBtns[i].style.display = readonly ? 'none' : '';
        // 禁用下拉
        var selects = document.querySelectorAll('#editModal select');
        for (var i = 0; i < selects.length; i++) selects[i].disabled = readonly;
        // 禁用 textarea
        var ta = document.getElementById('editRemark');
        if (ta) ta.disabled = readonly;
        // 只读时加视觉样式
        var allInputs = document.querySelectorAll('#editModal input, #editModal select, #editModal textarea');
        for (var i = 0; i < allInputs.length; i++) {
            allInputs[i].style.background = readonly ? '#f5f7fa' : '';
            allInputs[i].style.color = readonly ? '#8c8f99' : '';
        }
    }

    function openViewModal(id) {
        var r = findRecord(id);
        if (!r) return;
        isViewMode = true;
        editingId = id;
        document.getElementById('editModalTitle').textContent = '查看计费规则';
        resetEditForm();

        // 显示编号
        document.getElementById('billingCodeRow').style.display = 'flex';
        document.getElementById('editBillingCode').value = r.billingCode || '';

        // 填充计费模式下拉
        initStrategySelect();

        document.getElementById('editSupplier').value = r.supplier;
        // 设置API多选
        var apiArr = Array.isArray(r.api) ? r.api : (r.api ? [r.api] : []);
        setApiValues(apiArr);
        document.getElementById('strategySelect').value = r.mode;
        document.getElementById('editStatus').value = r.status;
        document.getElementById('editRemark').value = r.remark || '';

        var parts = r.period.split(' ~ ');
        document.getElementById('editDateStart')._flatpickr.setDate(parts[0] || '');
        document.getElementById('editDateEnd')._flatpickr.setDate(parts[1] || '');

        if (r.mode === 'perCall' && r.detail) {
            var priceEl = document.getElementById('edit_perCall_price');
            if (priceEl) priceEl.value = r.detail.price || '';
        } else if (r.mode === 'volume' && r.detail) {
            document.getElementById('edit_volume_count').value = r.detail.count || '';
            document.getElementById('edit_volume_fee').value = r.detail.fee || '';
            document.getElementById('edit_volume_overprice').value = r.detail.overprice || '';
        } else if (r.mode === 'tiered' && r.detail && r.detail.tiers) {
            var ttb = document.querySelector('#tierTable tbody');
            ttb.innerHTML = '';
            tierCount = 0;
            for (var i = 0; i < r.detail.tiers.length; i++) {
                tierCount++;
                var t = r.detail.tiers[i];
                var tr = document.createElement('tr');
                tr.innerHTML = '<td>第' + tierCount + '档</td>'
                    + '<td><input type="text" value="' + (t.from||'') + '"></td>'
                    + '<td><input type="text" value="' + (t.to||'') + '"></td>'
                    + '<td><input type="text" value="' + (t.price||'') + '"></td>';
                ttb.appendChild(tr);
            }
        }

        onStrategyChange();
        setFormReadOnly(true);
        document.getElementById('editModalFooter').innerHTML =
            '<button class="btn-default" onclick="closeEditModal()">关闭</button>';
        document.getElementById('editModal').classList.add('active');
        setTimeout(updateApiDisplay, 50);
    }

    // ========== 弹窗控制 ==========
    function closeEditModal() {
        document.getElementById('editModal').classList.remove('active');
        if (isViewMode) {
            isViewMode = false;
            setFormReadOnly(false);
            restoreEditFooter();
        }
    }

    document.getElementById('editModal').addEventListener('click', function(e) { if (e.target === this) closeEditModal(); });
    function findRecord(id) {
        for (var i = 0; i < allData.length; i++) {
            if (allData[i].id === id) return allData[i];
        }
        return null;
    }

    function resetEditForm() {
        initStrategySelect();
        document.getElementById('editSupplier').value = '';
        resetApiValues();
        document.getElementById('strategySelect').value = '';
        document.getElementById('editStatus').value = '启用';
        document.getElementById('editRemark').value = '';
        document.getElementById('editDateStart').value = '';
        document.getElementById('editDateEnd').value = '';
        document.getElementById('edit_perCall_price').value = '';
        document.getElementById('edit_volume_count').value = '';
        document.getElementById('edit_volume_fee').value = '';
        document.getElementById('edit_volume_overprice').value = '';
        // 隐藏编号行（新增时不显示）
        document.getElementById('billingCodeRow').style.display = 'none';
        document.getElementById('editBillingCode').value = '';
        // 重置阶梯
        var ttb = document.querySelector('#tierTable tbody');
        ttb.innerHTML = '<tr><td>第1档</td><td><input type="text" value="0"></td><td><input type="text" value="50000"></td><td><input type="text" value="2.0"></td></tr>'
            + '<tr><td>第2档</td><td><input type="text" value="50001"></td><td><input type="text" value="100000"></td><td><input type="text" value="1.5"></td></tr>'
            + '<tr><td>第3档</td><td><input type="text" value="100001"></td><td><input type="text" placeholder="不限"></td><td><input type="text" value="1.0"></td></tr>';
        tierCount = 3;
        hideAllStrategyFields();
    }

    // ========== 初始化计费模式下拉 ==========
    function initStrategySelect() {
        var sel = document.getElementById('strategySelect');
        sel.innerHTML = '<option value="">请选择计费模式</option>';
        for (var i = 0; i < allModes.length; i++) {
            var opt = document.createElement('option');
            opt.value = allModes[i].value;
            opt.textContent = allModes[i].label;
            sel.appendChild(opt);
        }
        hideAllStrategyFields();
    }

    // ========== 模式切换 ==========
    function hideAllStrategyFields() {
        var fields = ['perCall', 'volume', 'tiered'];
        for (var i = 0; i < fields.length; i++) {
            var el = document.getElementById('fields-' + fields[i]);
            if (el) el.style.display = 'none';
        }
    }
    function onStrategyChange() {
        hideAllStrategyFields();
        var val = document.getElementById('strategySelect').value;
        if (val) {
            var el = document.getElementById('fields-' + val);
            if (el) el.style.display = 'flex';
        }
    }

    // ========== 阶梯操作 ==========
    var tierCount = 3;
    function addTier() {
        tierCount++;
        var tbody = document.querySelector('#tierTable tbody');
        var tr = document.createElement('tr');
        tr.innerHTML = '<td>第' + tierCount + '档</td>'
            + '<td><input type="text" placeholder="起始"></td>'
            + '<td><input type="text" placeholder="截止"></td>'
            + '<td><input type="text" placeholder="单价"></td>';
        tbody.appendChild(tr);
    }

    // ========== 确认弹窗 ==========
    function showConfirm(title, msg, callback) {
        document.getElementById('confirmTitle').textContent = title;
        document.getElementById('confirmMsg').textContent = msg;
        confirmCallback = callback;
        document.getElementById('confirmDialog').classList.add('show');
    }
    function closeConfirm() {
        document.getElementById('confirmDialog').classList.remove('show');
        confirmCallback = null;
    }
    function confirmOk() {
        if (confirmCallback) confirmCallback();
        closeConfirm();
    }
    document.getElementById('confirmDialog').addEventListener('click', function(e) { if (e.target === this) closeConfirm(); });
</script>
