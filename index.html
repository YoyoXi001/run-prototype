<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>外数 | 数据门户</title>
    <link rel="stylesheet" href="https://unpkg.com/element-ui/lib/theme-chalk/index.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Source+Sans+Pro:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans SC', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f0f2f6;
            color: #666666;
            font-size: 14px;
        }
        .app-layout { min-height: 100vh; background: #f5f7fa; }
        /* 顶部导航栏 */
        .top-nav {
            background: linear-gradient(135deg, #84B9FD, #E1EDFB);
            box-shadow: 0 1px 4px rgba(0, 21, 41, 0.08);
            position: sticky; top: 0; z-index: 100;
            height: 80px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 40px;
        }
        .logo-area { width: 265px; height: 50px; display: flex; align-items: center; gap: 12px; }
        .logo-img { height: 40px; width: auto; }
        .logo-text { display: flex; flex-direction: column; }
        .logo-title {
            font-size: 18px; font-weight: 700; color: #1f2f3d;
            font-family: 'Source Han Sans SC', 'Source Sans Pro', sans-serif;
            letter-spacing: 1px; line-height: 1.3;
        }
        .logo-sub { font-size: 10px; color: #5a6e8c; margin-top: 2px; }
        .nav-tabs { display: flex; gap: 48px; position: absolute; left: 320px; }
        .nav-tab {
            cursor: pointer; font-size: 18px; font-family: 'Source Han Sans SC', 'Source Sans Pro', sans-serif;
            color: #333333; position: relative; transition: all 0.3s; font-weight: 400; padding-bottom: 4px;
        }
        .nav-tab:hover { color: #1152c5; }
        .nav-tab.active { color: #1152c5; font-weight: 700; }
        .nav-tab.active::after {
            content: ''; position: absolute; bottom: -8px; left: 0; right: 0;
            height: 2px; background: #1152c5; border-radius: 2px;
        }
        .user-area { display: flex; align-items: center; gap: 16px; position: relative; }
        .message-icon-wrapper { position: relative; cursor: pointer; display: flex; align-items: center; }
        .message-icon { font-size: 20px; color: #5a5e66; }
        .message-icon:hover { color: #1152c5; }
        .unread-badge-icon {
            position: absolute; top: -8px; right: -12px; background: #f5222d; color: #fff;
            font-size: 11px; font-weight: 500; padding: 2px 5px; border-radius: 20px;
            min-width: 18px; text-align: center; border: 1px solid #fff; display: none; line-height: 1.2;
        }
        .tenant-info { font-size: 14px; color: #5a5e66; font-family: 'Source Han Sans SC', sans-serif; cursor: pointer; padding: 4px 8px; }
        .tenant-name { font-weight: 500; color: #1f2f3d; }
        .avatar {
            width: 33px; height: 33px; background: #fcb53e; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-weight: 600; font-size: 16px; cursor: pointer;
            font-family: 'Source Han Sans SC', sans-serif;
        }
        /* 左侧菜单栏 */
        .sidebar {
            width: 241px; background: #fff; border-right: 1px solid #e9ecef;
            position: fixed; left: 0; top: 80px; bottom: 0; overflow-y: hidden;
            padding: 16px 0;
        }
        .menu-item {
            display: flex; align-items: center; justify-content: space-between;
            width: 240px; height: 48px; padding: 0 20px; margin-bottom: 10px;
            cursor: pointer; font-family: 'Source Han Sans SC', 'Source Sans Pro', sans-serif;
            font-size: 16px; color: #333333; transition: all 0.3s;
            background: transparent; border-radius: 0; position: relative;
        }
        .menu-item:hover { background: #fef5ec; }
        .menu-item.active {
            background: linear-gradient(270deg, #fefdfb, #fef5ec); color: #f89d34;
            border-right: 2px solid #f89d34;
        }
        .menu-item .menu-left { display: flex; align-items: center; gap: 12px; }
        .menu-item i { font-size: 18px; width: 22px; }
        /* 右侧内容面板 */
        .main-content {
            margin-left: 240px; padding: 8px 16px 16px 16px;
            min-height: calc(100vh - 80px); background: #F5F7FA;
            display: flex; flex-direction: column;
        }
        .content-card { background: transparent; border-radius: 0; padding: 0; box-shadow: none; flex: 1; display: flex; flex-direction: column; }
        /* 目录面包屑 */
        .breadcrumb {
            padding: 0; margin: 0 0 8px 0; background: transparent; font-size: 14px;
            font-family: 'Noto Sans SC', sans-serif; color: #666666; border: none;
        }
        .breadcrumb .separator { margin: 0 8px; color: #c0c4cc; }
        .breadcrumb .current { color: #3a6df0; font-weight: 500; }
        /* 布局容器 */
        .forecast-layout { flex: 1; display: flex; flex-direction: column; }
        .forecast-white-card { flex: 1; display: flex; flex-direction: column; background: #fff; border-radius: 6px; padding: 20px; margin-bottom: 0; box-shadow: 0 1px 2px rgba(0,0,0,0.03); min-height: 0; }
        /* 内容区域 */
        .welcome-title { font-size: 24px; color: #333; margin-bottom: 20px; }
        .welcome-desc { color: #666; line-height: 1.8; }
    </style>
</head>
<body>
    <div class="app-layout">
        <!-- 顶部导航栏 -->
        <div class="top-nav">
            <div class="logo-area">
                <div class="logo-text">
                    <div class="logo-title">外数平台</div>
                    <div class="logo-sub">EXTERNAL DATA PLATFORM</div>
                </div>
            </div>
            <div class="nav-tabs">
                <div class="nav-tab active" onclick="showNavMenu('portal')">数据门户</div>
                <div class="nav-tab" onclick="showNavMenu('external')">外源管理</div>
                <div class="nav-tab" onclick="showNavMenu('service')">服务管理</div>
                <div class="nav-tab" onclick="showNavMenu('monitor')">监控统计</div>
                <div class="nav-tab" onclick="showNavMenu('operation')">运营管理</div>
                <div class="nav-tab" onclick="showNavMenu('personal')">个人中心</div>
                <div class="nav-tab" onclick="showNavMenu('system')">系统管理</div>
            </div>
            <div class="user-area">
                <div class="message-icon-wrapper">
                    <i class="el-icon-bell message-icon"></i>
                    <span class="unread-badge-icon">3</span>
                </div>
                <div class="tenant-info"><span class="tenant-name">某某金控</span></div>
                <div class="avatar">席</div>
            </div>
        </div>
        
        <!-- 左侧菜单栏 -->
        <div class="sidebar" id="sideMenu">
            <div class="menu-item active" onclick="navigateTo('index.html')">
                <div class="menu-left"><i class="el-icon-home"></i><span>数据门户</span></div>
            </div>
        </div>
        
        <!-- 右侧内容区域 -->
        <div class="main-content">
            <div class="content-card">
                <div class="breadcrumb">
                    <span>数据门户</span>
                </div>
                <div class="forecast-layout">
                    <div class="forecast-white-card">
                        <h2 class="welcome-title">欢迎使用外数平台</h2>
                        <p class="welcome-desc">外数平台是一个综合性的数据管理平台，提供数据采集、处理、存储和分析等功能。</p>
                        <p class="welcome-desc">通过集中管控模块，您可以管理配额、监控告警、调度任务和管理合同。</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://unpkg.com/element-ui/lib/index.js"></script>
    <script>
        function navigateTo(url) {
            window.location.href = url;
        }
        
        const navMenus = {
            portal: [
                { name: '数据门户', url: 'index.html' }
            ],
            external: [
                { name: '供应商管理', url: 'index.html' },
                { name: '合同管理', url: '任务管理&合同管理V1.3.html#contract' },
                { name: 'API服务配置', url: 'index.html' },
                { name: '数据库服务配置', url: 'index.html' },
                { name: '数据库配置', url: 'index.html' }
            ],
            service: [
                { name: '服务管理', url: 'index.html' },
                { name: '调用方管理', url: 'index.html' },
                { name: '目录管理', url: 'index.html' },
                { name: '状态码映射', url: 'index.html' }
            ],
            monitor: [
                { name: '用数大屏', url: '用数大屏.html' },
                { name: '用量统计', url: '告警管理V1.2.html' },
                { name: '数据源调用统计', url: 'index.html' },
                { name: '服务调用统计', url: 'index.html' },
                { name: '业务单元调用统计', url: 'index.html' },
                { name: '链路实时监控', url: '链路实时监控.html' },
                { name: '数据质量监控', url: '数据质量监控.html' },
                { name: '系统性能监控', url: '系统性能监控.html' },
                { name: '服务性能监控', url: '服务性能监控.html' },
                { name: '流量分析', url: 'index.html' }
            ],
            operation: [
                { name: '告警管理', url: '告警管理V1.2.html#rule' },
                { name: '用量预测', url: '告警管理V1.2.html#forecast' },
                { name: '告警渠道', url: '告警管理V1.2.html#channel' },
                { name: '配额管理', url: '配额管理V1.1.html' },
                { name: '计费管理', url: '计费管理.html' },
                { name: '账单管理', url: '账单管理.html' },
                { name: '对账管理', url: '对账管理.html' },
                { name: '任务管理', url: '任务管理&合同管理V1.3.html#task' }
            ],
            personal: [
                { name: '我的审批', url: '个人中心V1.3.html#approval' },
                { name: '我的收藏', url: '个人中心V1.3.html#favorites' },
                { name: '消息通知', url: '个人中心V1.3.html#message' }
            ],
            system: [
                { name: '调用日志', url: '调用日志.html' },
                { name: '操作日志', url: 'index.html' },
                { name: '用户管理', url: '用户管理.html' },
                { name: '权限管理', url: '权限管理.html' },
                { name: '数据字典', url: 'index.html' }
            ]
        };
        
        function showNavMenu(menuKey) {
            document.querySelectorAll('.nav-tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            
            const menu = navMenus[menuKey] || [];
            const sideMenu = document.getElementById('sideMenu');
            
            if (menu.length === 0) {
                sideMenu.innerHTML = '<div class="menu-item active" onclick="navigateTo(\'index.html\')"><div class="menu-left"><i class="el-icon-home"></i><span>数据门户</span></div></div>';
                return;
            }
            
            let html = '';
            menu.forEach((item, index) => {
                html += `<div class="menu-item ${index === 0 ? 'active' : ''}" onclick="navigateTo('${item.url}')"><div class="menu-left"><i class="el-icon-document"></i><span>${item.name}</span></div></div>`;
            });
            sideMenu.innerHTML = html;
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            var hash = window.location.hash;
            if (hash === '#contract') {
                document.querySelector('.nav-tab:nth-child(2)').classList.add('active');
                document.querySelector('.nav-tab:first-child').classList.remove('active');
            }
        });
    </script>
</body>
</html>
