    <style>

            font-family: 'Noto Sans SC', 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;

        }
        .app-layout { min-height: 100vh; background: #f5f7fa; }

        /* 顶部导航栏 */
        .top-nav {
            background: linear-gradient(135deg, #84B9FD, #E1EDFB);

            position: sticky; top: 0; z-index: 100;
            height: 80px; display: flex; align-items: center; justify-content: space-between;

        }
        .logo-area { width: 265px; height: 50px; display: flex; align-items: center; gap: 12px; }
        .logo-text { display: flex; flex-direction: column; }
        .logo-title { font-size: 18px; font-weight: 700; color: #1f2f3d; font-family: 'Source Han Sans SC', 'Source Sans Pro', sans-serif; letter-spacing: 1px; line-height: 1.3; }

        .user-area { display: flex; align-items: center; gap: 16px; position: relative; }
        .message-icon-wrapper { position: relative; cursor: pointer; display: flex; align-items: center; }
        .message-icon { font-size: 20px; color: #5a5e66; }
        .message-icon:hover { color: #1152c5; }

        .content-card { background: transparent; border-radius: 0; padding: 0; box-shadow: none; flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }

        /* 顶部操作栏 */
        .sticky-top-bar {
            background: #F5F7FA;
            padding: 4px 16px 0 16px;

        .detail-kv-label { font-size: 13px; color: #999; width: 80px; flex-shrink: 0; }

        /* 表格 */
        .table-container { border: 1px solid #ebeef5; border-radius: 2px; overflow-x: auto; overflow-y: auto; max-height: 460px; padding: 0; }
        .data-table { width: 100%; border-collapse: collapse; font-size: 14px; }
        .data-table th { padding: 0 12px; height: 48px; background: #F5F7FA; font-weight: 600; color: #777777; font-size: 14px; border-bottom: 1px solid #ebeef5; border-right: 1px solid #ebeef5; text-align: center; white-space: nowrap; position: sticky; top: 0; z-index: 1; }

        .data-table th:last-child, .data-table td:last-child { border-right: none; }
        .data-table tr:last-child td { border-bottom: none; }
        .data-table tr:hover td { background: #f8fafc; }
        .action-link { color: #0d6cff; cursor: pointer; text-decoration: none; font-size: 13px; margin: 0 3px; display: inline-block; }
        .action-link:hover { text-decoration: underline; }
        .amount-text { font-weight: 600; color: #333; font-size: 13px; }
        .price-cell { font-size: 12px; line-height: 1.6; color: #333; text-align: center; }

        /* 弹窗 */

        .modal-mask.show { display: flex; }
        .modal { background: #fff; border-radius: 8px; width: 1200px; max-height: 85vh; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 4px 24px rgba(0,0,0,0.15); }

        .modal-title { font-size: 18px; font-weight: 700; color: #1f2f3d; }
        .modal-close { font-size: 20px; color: #999; cursor: pointer; background: none; border: none; line-height: 1; }
        .modal-close:hover { color: #f5222d; }
        .modal-body { padding: 24px; overflow-y: auto; flex: 1; }
        .modal-footer { padding: 16px 24px; display: flex; justify-content: center; gap: 12px; border-top: 1px solid #ebeef5; }
        .btn-cancel { background: #fff; color: #666; border: 1px solid #dcdfe6; padding: 10px 28px; border-radius: 4px; font-size: 14px; cursor: pointer; }
        .btn-cancel:hover { background: #f5f7fa; }
        .table-toolbar { display: flex; justify-content: flex-end; margin-bottom: 8px; }
        .btn-export { display: inline-flex; align-items: center; gap: 4px; background: #f89d34; color: #fff; border: none; padding: 6px 16px; border-radius: 4px; font-size: 13px; cursor: pointer; }
        .btn-export:hover { background: #e88a2e; }
    </style>
</head>

<script>
    // ========== 数据（与账单管理一致） ==========
    var allData = [
        { id:'BILL-202606-001', billingCode:'JF-API-QCC-QYJBXX-JT-003', supplier:'企查查', mode:'阶梯', price:'≤3万次¥1.8<br>3-8万¥1.2<br>&gt;8万¥0.8', usage:10000, amount:'¥500.00', type:'standard' },
        { id:'BILL-202606-002', billingCode:'JF-API-TYC-SFXP-BL-002', supplier:'天眼查', mode:'包量', price:'¥60,000/8万次<br>超额¥0.8/次', usage:85000, amount:'¥85,000.00', type:'standard' },
        { id:'BILL-202606-003', billingCode:'JF-API-TYC-QYJBXX-AC-001', supplier:'天眼查', mode:'按次', price:'¥1.0/次', usage:52000, amount:'¥52,000.00', type:'standard' },
        { id:'BILL-202606-004', billingCode:'JF-API-ZCX-XYPF-JT-005', supplier:'中诚信', mode:'阶梯', price:'≤5万次¥2.0<br>5-10万¥1.5<br>&gt;10万¥1.0', usage:92000, amount:'¥80,000.00', type:'non-standard' },
        { id:'BILL-202606-005', billingCode:'JF-API-QHZX-FQZPF-AC-007', supplier:'前海征信', mode:'按次', price:'¥0.8/次', usage:38500, amount:'¥30,800.00', type:'standard' },
        { id:'BILL-202606-006', billingCode:'JF-API-BSZX-GRXYBG-AC-006', supplier:'百行征信', mode:'按次', price:'¥2.5/次', usage:21800, amount:'¥54,500.00', type:'non-standard' }
    ];

    var billDetailsData = {
        'BILL-202606-001': {
            totalUsage: 10000,
            apis: [
                { name: '企业工商信息', tenants: [{ name: '租赁', usage: 5200 }, { name: '保险', usage: 3000 }, { name: '资产', usage: 1800 }] },
                { name: '股东信息', tenants: [{ name: '租赁', usage: 2800 }, { name: '风控', usage: 1200 }] },
                { name: '变更记录', tenants: [{ name: '保险', usage: 2000 }] }
            ]
        },
        'BILL-202606-002': {
            totalUsage: 85000,
            apis: [
                { name: '司法风险', tenants: [{ name: '租赁', usage: 45000 }, { name: '风控', usage: 25000 }, { name: '信贷', usage: 15000 }] },
                { name: '企业图谱', tenants: [{ name: '资产', usage: 12000 }, { name: '保险', usage: 8000 }] }
            ]
        },
        'BILL-202606-003': {
            totalUsage: 52000,
            apis: [
                { name: '企业工商信息', tenants: [{ name: '保险', usage: 32000 }, { name: '资产', usage: 12000 }, { name: '信贷', usage: 8000 }] }
            ]
        },
        'BILL-202606-004': {
            totalUsage: 92000,
            apis: [
                { name: '信用评分', tenants: [{ name: '资产', usage: 52000 }, { name: '风控', usage: 28000 }, { name: '信贷', usage: 12000 }] }
            ]
        },
        'BILL-202606-005': {
            totalUsage: 38500,
            apis: [
                { name: '反欺诈评分', tenants: [{ name: '信贷', usage: 28500 }, { name: '风控', usage: 10000 }] }
            ]
        },
        'BILL-202606-006': {
            totalUsage: 21800,
            apis: [
                { name: '个人信用报告', tenants: [{ name: '风控', usage: 15800 }, { name: '信贷', usage: 6000 }] }
            ]
        }
    };

    // ========== 页面初始化 ==========
    var params = new URLSearchParams(window.location.search);
    var billingId = params.get('id') || '';
    var currentBill = null;
    var currentDetail = null;

    function init() {
        // 查找账单记录
        for (var i = 0; i < allData.length; i++) {
            if (allData[i].id === billingId) { currentBill = allData[i]; break; }
        }
        currentDetail = billDetailsData[billingId];

        if (!currentBill) {
            document.querySelector('.scroll-body').innerHTML = '<div style="text-align:center;padding:60px 0;color:#999;font-size:16px;">未找到对应的账单记录</div>';
            return;
        }

        renderBasicInfo();
        renderUsageTable();
        renderFormula();
    }

    // ========== 基本信息 ==========
    function renderBasicInfo() {
        var r = currentBill;
        var html = '';
        html += '<div class="detail-kv-item"><div class="detail-kv-label">账单编号</div><div class="detail-kv-value">' + r.id + '</div></div>';
        html += '<div class="detail-kv-item"><div class="detail-kv-label">计费编号</div><div class="detail-kv-value" style="letter-spacing:0.3px;">' + r.billingCode + '</div></div>';
        html += '<div class="detail-kv-item"><div class="detail-kv-label">供应商</div><div class="detail-kv-value">' + r.supplier + '</div></div>';
        html += '<div class="detail-kv-item"><div class="detail-kv-label">计费模式</div><div class="detail-kv-value">' + r.mode + '</div></div>';
        html += '<div class="detail-kv-item"><div class="detail-kv-label">单价</div><div class="detail-kv-value">' + r.price.replace(/<br>/g, ' ') + '</div></div>';
        html += '<div class="detail-kv-item"><div class="detail-kv-label">应付金额</div><div class="detail-kv-value amount-text">' + r.amount + '</div></div>';
        document.getElementById('basicInfoGrid').innerHTML = html;
    }

    // ========== 用量明细表 ==========
    function renderUsageTable() {
        var r = currentBill;
        var detail = currentDetail;
        var totalUsage = detail ? detail.totalUsage : 0;
        var totalAmount = parseFloat(r.amount.replace(/[¥,]/g, '')) || 0;

        var html = '';
        if (detail && detail.apis) {
            var idx = 0;
            for (var a = 0; a < detail.apis.length; a++) {
                var api = detail.apis[a];
                for (var t = 0; t < api.tenants.length; t++) {
                    var tn = api.tenants[t];
                    idx++;

    function getTenantUsageData(billId, apiName, tenantName, totalUsage) {
        // 先从预置数据查找
        var preData = usageDetailData[billId];
        if (preData && preData[apiName] && preData[apiName][tenantName]) {
            return preData[apiName][tenantName];
        }
        // 动态生成
        var profile = tenantProfiles[tenantName] || tenantProfiles['租赁'];
        var services = apiServiceNames[apiName] || apiServiceNames['企业工商信息'];
        var rows = [];
        var remaining = totalUsage;
        for (var i = 0; i < profile.length; i++) {
            var p = profile[i];
            var isLast = (i === profile.length - 1);
            var billable = isLast ? remaining : Math.round(totalUsage * (0.08 + Math.random() * 0.18));
            if (billable > remaining) billable = remaining;
            if (billable < 1) billable = 1;
            remaining -= billable;
            rows.push({
                tenant: tenantName,
                company: p.company,
                department: p.department,
                system: p.system,
                service: services[i] || (p.system + '服务'),
                api: apiName,
                billable: billable,
                cache: Math.round(billable * (0.15 + Math.random() * 0.15))
            });
        }
        return rows;
    }

        styleRange(ws, 4, 1, 6, { font:headerFont, fill:headerFill, alignment:headerAlign, border:allBorders });
        // 订单数据行 (row 5)
        styleRange(ws, 5, 1, 6, { font:dataFont, alignment:cellAlign, border:allBorders });
        // 账单信息标题 (row 7)
        applyCellStyle(ws, 'B8', { font:{bold:true, sz:10, name:'Arial'}, alignment:{vertical:'center'} });
        // 账单表头 (row 8): B9-F9
        styleRange(ws, 8, 1, 5, { font:headerFont, fill:headerFill, alignment:headerAlign, border:allBorders });
        // 账单数据行
        for (var bi = 0; bi < apiRows.length; bi++) {
            styleRange(ws, 9 + bi, 1, 5, { font:dataFont, alignment:cellAlign, border:allBorders });
        }

        var wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, '对账单');
        var fname = currentBill.supplier + '_对账单_' + currentBill.id + '.xlsx';
        downloadWorkbook(wb, fname);
    }

    // ========== 导出已用明细 Excel ==========
    function exportUsageDetail() {
        if (!_modalBillId || !currentBill) return;
        var billData = usageDetailData[_modalBillId];
        var list = (billData && billData[_modalApiName]) || [];
        if (list.length === 0) { alert('暂无数据可导出'); return; }

        var supplier = currentBill.supplier;
        var totalBillable = 0, totalCache = 0;
        for (var i = 0; i < list.length; i++) {
            totalBillable += list[i].billable;
            totalCache += list[i].cache;
        }

        var aoa = [];
        // Row 1: 标题
        aoa.push(['', supplier + '-数据开放平台对账单', '', '', '', '', '', '', '', '']);
        // Row 2: 空行
        aoa.push([]);
        // Row 3: 客户名称 + 账单周期
        aoa.push(['', '客户名称：某某金控', '', '', '', '账单周期：2026-06-01 至 2026-06-30', '', '', '', '']);
        // Row 4: 订单信息
        aoa.push(['', '订单信息']);
        // Row 5: 订单表头
        aoa.push(['', '订单编号', '计费模式', '总查询量', '有效查询量', '应付金额（元）']);
        // Row 6: 订单数据
        var totalAmount = parseFloat(currentBill.amount.replace(/[¥,]/g, '')) || 0;
        aoa.push(['', currentBill.billingCode, currentBill.mode, (totalBillable + totalCache).toLocaleString(), totalBillable.toLocaleString(), totalAmount.toFixed(2)]);
        // Row 7: 账单信息
        aoa.push(['', '账单信息']);
        // Row 8: 账单表头
        aoa.push(['', '租户', '公司', '部门', '系统', '服务', 'API', '计费次数', '命中缓存数', '周期范围']);
        // Row 9+: 明细数据
        for (var j = 0; j < list.length; j++) {
            var d = list[j];
            aoa.push(['', d.tenant, d.company, d.department, d.system, d.service, d.api, d.billable, d.cache, '2026-06-01 ~ 2026-06-30']);
        }
        // 合计行
        aoa.push(['', '合计', '', '', '', '', '', totalBillable, totalCache, '']);

        var ws = XLSX.utils.aoa_to_sheet(aoa);

        // 合并单元格
        ws['!merges'] = [
            { s:{r:0,c:1}, e:{r:0,c:7} },   // 标题 B1:H1
            { s:{r:2,c:1}, e:{r:2,c:4} },   // 客户名称 B3:E3
            { s:{r:2,c:5}, e:{r:2,c:9} }    // 账单周期 F3:J3
        ];

        // 列宽
        ws['!cols'] = [
            {wch:3}, {wch:16}, {wch:12}, {wch:14}, {wch:16}, {wch:18}, {wch:16}, {wch:12}, {wch:12}, {wch:22}
        ];

        // 样式
        // 标题行
        applyCellStyle(ws, 'B1', { font:{bold:true, sz:14, name:'宋体'}, alignment:{horizontal:'center', vertical:'center'} });
        // 客户信息行
        applyCellStyle(ws, 'B3', { font:{sz:9, name:'宋体'}, alignment:{vertical:'center'} });
        applyCellStyle(ws, 'F3', { font:{sz:9, name:'宋体'}, alignment:{vertical:'center'} });
        // 订单信息标题
        applyCellStyle(ws, 'B4', { font:{bold:true, sz:10, name:'宋体'}, alignment:{vertical:'center'} });
        // 订单表头
        styleRange(ws, 4, 1, 6, { font:headerFont, fill:headerFill, alignment:headerAlign, border:allBorders });
        // 订单数据行
        styleRange(ws, 5, 1, 6, { font:dataFont, alignment:cellAlign, border:allBorders });
        // 账单信息标题
        applyCellStyle(ws, 'B7', { font:{bold:true, sz:10, name:'宋体'}, alignment:{vertical:'center'} });
        // 账单表头
        styleRange(ws, 7, 1, 9, { font:headerFont, fill:headerFill, alignment:headerAlign, border:allBorders });
        // 明细数据行
        var dataStartRow = 8;
        for (var di = 0; di < list.length; di++) {
            styleRange(ws, dataStartRow + di, 1, 9, { font:dataFont, alignment:cellAlign, border:allBorders });
        }
        // 合计行
        var sumRow = dataStartRow + list.length;
        styleRange(ws, sumRow, 1, 9, { font:{bold:true, sz:9, name:'Arial', color:{rgb:'FF333333'}}, fill:{fgColor:{rgb:'FFFAFBFC'}}, alignment:cellAlign, border:allBorders });

        var wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, '已用明细');
        var fname = supplier + '_已用明细_' + _modalApiName + '.xlsx';
        downloadWorkbook(wb, fname);
    }

    // ========== 启动 ==========
    init();
</script>
<script>
document.addEventListener('click', function(e) {
    var link = e.target.closest('a.sidebar-item, a.menu-item');
    if (link && link.getAttribute('href') === 'index.html') {
        e.preventDefault();
        document.querySelectorAll('.sidebar-item, .menu-item').forEach(function(m) { m.classList.remove('active'); });
        link.classList.add('active');
    }
});
</script>
<script>
document.addEventListener('click', function(e) {
    var navTab = e.target.closest('a.nav-tab');
    if (navTab) {
        var navKeys = {'数据门户':'portal','外源管理':'external','服务管理':'service','监控统计':'monitor','运营管理':'operation','个人中心':'personal','系统管理':'system'};
        var text = navTab.textContent.trim();
        if (navKeys[text]) localStorage.setItem('_navMenu', navKeys[text]);
    }
});
</script>
</body>
</html>
