    // ========== 页面初始化 ==========
    var params = new URLSearchParams(window.location.search);

    var currentBill = null;
    var currentDetail = null;

    function init() {
        // 查找账单记录
        for (var i = 0; i < allData.length; i++) {
            if (allData[i].id === billingId) { currentBill = allData[i]; break; }
        }
        currentDetail = billDetailsData[billingId];

        if (!currentBill) {
            document.querySelector('.scroll-body').innerHTML = '<div style="text-align:center;padding:60px 0;color:#999;font-size:16px;">未找到对应的账单记录</div>';
            return;
        }

        renderBasicInfo();
        renderUsageTable();
        renderFormula();
    }

    // ========== 基本信息 ==========
    function renderBasicInfo() {
        var r = currentBill;
        var html = '';
        html += '<div class="detail-kv-item"><div class="detail-kv-label">账单编号</div><div class="detail-kv-value">' + r.id + '</div></div>';
        html += '<div class="detail-kv-item"><div class="detail-kv-label">计费编号</div><div class="detail-kv-value" style="letter-spacing:0.3px;">' + r.billingCode + '</div></div>';
        html += '<div class="detail-kv-item"><div class="detail-kv-label">供应商</div><div class="detail-kv-value">' + r.supplier + '</div></div>';
        html += '<div class="detail-kv-item"><div class="detail-kv-label">计费模式</div><div class="detail-kv-value">' + r.mode + '</div></div>';
        html += '<div class="detail-kv-item"><div class="detail-kv-label">单价</div><div class="detail-kv-value">' + r.price.replace(/<br>/g, ' ') + '</div></div>';
        html += '<div class="detail-kv-item"><div class="detail-kv-label">应付金额</div><div class="detail-kv-value amount-text">' + r.amount + '</div></div>';
        document.getElementById('basicInfoGrid').innerHTML = html;
    }

    // ========== 用量明细表 ==========
    function renderUsageTable() {
        var r = currentBill;
        var detail = currentDetail;
        var totalUsage = detail ? detail.totalUsage : 0;
        var totalAmount = parseFloat(r.amount.replace(/[¥,]/g, '')) || 0;

        var html = '';
        if (detail && detail.apis) {
            var idx = 0;
            for (var a = 0; a < detail.apis.length; a++) {
                var api = detail.apis[a];
                for (var t = 0; t < api.tenants.length; t++) {
                    var tn = api.tenants[t];
                    idx++;
                    var ratio = totalUsage > 0 ? (tn.usage / totalUsage) : 0;
                    var shareAmt = totalAmount * ratio;
                    html += '<tr>';
                    html += '<td style="font-size:12px;">' + idx + '</td>';
                    html += '<td>' + r.supplier + '</td>';
                    html += '<td>' + api.name + '</td>';
                    html += '<td>' + tn.name + '</td>';
                    html += '<td>' + tn.usage.toLocaleString() + '</td>';
                    html += '<td>' + (ratio * 100).toFixed(1) + '%</td>';
                    html += '<td class="amount-text">¥' + shareAmt.toFixed(2) + '</td>';
                    html += '<td><a class="action-link" onclick="openUsageDetailModal(\'' + billingId + '\',\'' + api.name + '\')">已用明细</a></td>';
                    html += '</tr>';
                }
            }
            html += '<tr style="background:#fafbfc;font-weight:600;">';
            html += '<td colspan="4" style="color:#333;text-align:center;">合计</td>';
            html += '<td style="color:#f89d34;">' + totalUsage.toLocaleString() + '</td>';
            html += '<td style="color:#f89d34;">100.0%</td>';
            html += '<td class="amount-text" style="color:#f89d34;">' + r.amount + '</td>';
            html += '<td></td>';
            html += '</tr>';
        } else {
            html += '<tr><td colspan="8" style="padding:32px 0;color:#999;">暂无数据</td></tr>';
        }
        document.getElementById('usageDetailBody').innerHTML = html;
    }

    // ========== 计算公式 ==========
    function renderFormula() {
        var r = currentBill;
        var html = '';
        html += '<div><span style="color:#999;display:inline-block;width:160px;">总查询量</span> = 真实调用次数 + 命中缓存次数</div>';
        html += '<div><span style="color:#999;display:inline-block;width:160px;">使用占比</span> = 该租户API查询量 / 总查询量</div>';
        html += '<div><span style="color:#999;display:inline-block;width:160px;">分摊金额</span> = 应付金额 × 使用占比</div>';
        if (r.mode === '按次') {
            html += '<div style="margin-top:6px;"><span style="color:#999;display:inline-block;width:160px;">按次计费金额</span> = 计费次数 × 单价</div>';
        } else if (r.mode === '包量') {
            html += '<div style="margin-top:6px;"><span style="color:#999;display:inline-block;width:160px;">包量计费金额</span> = 包量费用 + MAX(0, 计费次数 - 包含次数) × 超额单价</div>';
        } else if (r.mode === '阶梯') {
            html += '<div style="margin-top:6px;"><span style="color:#999;display:inline-block;width:160px;">阶梯计费金额</span> = 按所在档位单价 × 计费次数</div>';
        }
        document.getElementById('formulaSection').innerHTML = html;
    }

    // ========== 已用明细弹窗 ==========
    function openUsageDetailModal(billId, apiName) {
        document.getElementById('usageDetailTitle').textContent = '已用明细 - ' + apiName;
        var billData = usageDetailData[billId];
        var list = (billData && billData[apiName]) || [];
        var html = '';
        var totalBillable = 0, totalCache = 0;
        for (var i = 0; i < list.length; i++) {
            var r = list[i];
            totalBillable += r.billable;
            totalCache += r.cache;
            html += '<tr>'
                + '<td>' + r.tenant + '</td>'
                + '<td>' + r.company + '</td>'
                + '<td>' + r.department + '</td>'
                + '<td>' + r.system + '</td>'
                + '<td>' + r.service + '</td>'
                + '<td>' + r.api + '</td>'
                + '<td style="color:#f89d34;font-weight:600;">' + r.billable.toLocaleString() + '</td>'
                + '<td>' + r.cache.toLocaleString() + '</td>'
                + '<td style="font-size:12px;white-space:nowrap;">2026-06-01 ~ 2026-06-30</td>'
                + '</tr>';
        }
        if (list.length === 0) {
            html = '<tr><td colspan="9" style="padding:32px 0;color:#999;">暂无数据</td></tr>';
        } else {
            html += '<tr style="background:#fafbfc;font-weight:600;">'
                + '<td colspan="6" style="color:#333;text-align:center;">合计</td>'
                + '<td style="color:#f89d34;">' + totalBillable.toLocaleString() + '</td>'
                + '<td>' + totalCache.toLocaleString() + '</td>'
                + '<td></td>'
                + '</tr>';
        }
        document.getElementById('usageDetailModalBody').innerHTML = html;
        document.getElementById('usageDetailModal').classList.add('show');
    }

    function closeUsageDetailModal() {
        document.getElementById('usageDetailModal').classList.remove('show');
    }

    document.getElementById('usageDetailModal').addEventListener('click', function(e) {
        if (e.target === this) closeUsageDetailModal();
    });

    function goBack() {
        window.location.href = '账单管理.html';
    }
