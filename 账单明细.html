    // ========== 按 租户+公司 聚合 ==========
    function aggregateTenantCompany(records) {
        var map = {};
        var order = [];
        for (var i = 0; i < records.length; i++) {
            var r = records[i];
            var key = r.tenant + '|' + r.company;
            if (!map[key]) {
                map[key] = { supplier: r.supplier, tenant: r.tenant, company: r.company, totalQueries: 0, billableQueries: 0, cacheHits: 0, fee: 0 };
                order.push(key);
            }
            map[key].totalQueries += r.totalQueries;
            map[key].billableQueries += r.billableQueries;
            map[key].cacheHits += r.cacheHits;
            map[key].fee += r.fee;
        }
        var result = [];
        for (var j = 0; j < order.length; j++) {
            result.push(map[order[j]]);
        }
        return result;
    }

    // ========== 渲染用量明细表 ==========
    var usageList = [];
    var usagePage = 1, usagePageSize = 10;

    function renderUsageTable() {
        usageList = aggregateTenantCompany(currentRecords);
        var totalBillable = summary.billableQueries;
        var totalFee = summary.totalFee;

        // 计算分摊比例
        for (var i = 0; i < usageList.length; i++) {
            usageList[i].ratio = totalBillable > 0 ? (usageList[i].billableQueries / totalBillable) : 0;
        }

        var total = Math.ceil(usageList.length / usagePageSize) || 1;
        if (usagePage > total) usagePage = total;
        var startIdx = (usagePage - 1) * usagePageSize;
        var pageData = usageList.slice(startIdx, startIdx + usagePageSize);

        var tbody = document.getElementById('usageTableBody');
        if (pageData.length === 0) {
            tbody.innerHTML = '<tr><td colspan="9" style="padding:40px 0;color:#999;">暂无数据</td></tr>';
            updateUsagePagination(0, 1);
            return;
        }

        var html = '';
        for (var i = 0; i < pageData.length; i++) {
            var r = pageData[i];
            var displayTenant = getDisplayTenant(r.tenant);
            html += '<tr>'
                + '<td>' + r.supplier + '</td>'
                + '<td>' + displayTenant + '</td>'
                + '<td>' + r.company + '</td>'
                + '<td>' + r.totalQueries.toLocaleString() + '</td>'
                + '<td>' + r.billableQueries.toLocaleString() + '</td>'
                + '<td>' + r.cacheHits.toLocaleString() + '</td>'
                + '<td class="amount-text">¥' + r.fee.toLocaleString('zh-CN', {minimumFractionDigits:2, maximumFractionDigits:2}) + '</td>'
                + '<td>' + (r.ratio * 100).toFixed(2) + '%</td>'
                + '<td><a class="action-link" onclick="openDetailModal(\'' + r.tenant.replace(/'/g,"\\'") + '\',\'' + r.company.replace(/'/g,"\\'") + '\')">查看明细</a></td>'
                + '</tr>';
        }

        tbody.innerHTML = html;
        updateUsagePagination(usageList.length, total);
    }

    function updateUsagePagination(totalCount, totalPages) {
        var cp = usagePage;
        var container = document.getElementById('usagePagination');
        var html = '<span class="total-text">共 ' + totalCount + ' 条</span>';
        html += '<button class="page-btn" ' + (cp===1?'disabled':'') + ' onclick="changeUsagePage(' + (cp-1) + ')"><i class="el-icon-arrow-left"></i></button>';
        var start = Math.max(1, cp - 2), end = Math.min(totalPages, cp + 2);
        for (var i = start; i <= end; i++) {
            html += '<span class="page-number ' + (i===cp?'active':'') + '" onclick="changeUsagePage(' + i + ')">' + i + '</span>';
        }
        html += '<button class="page-btn" ' + (cp===totalPages?'disabled':'') + ' onclick="changeUsagePage(' + (cp+1) + ')"><i class="el-icon-arrow-right"></i></button>';
        html += '<select class="page-size-select" onchange="changeUsagePageSize(this.value)">'
            + '<option value="10" ' + (usagePageSize===10?'selected':'') + '>10条/页</option>'
            + '<option value="20" ' + (usagePageSize===20?'selected':'') + '>20条/页</option>'
            + '<option value="50" ' + (usagePageSize===50?'selected':'') + '>50条/页</option>'
            + '</select>';
        html += '<div class="jump-section"><span>前往</span><input type="number" id="usageJumpInput" min="1" max="' + totalPages + '" value="' + cp + '" onkeydown="if(event.keyCode===13) jumpUsagePage()"><span>页</span></div>';
        container.innerHTML = html;
    }

    function changeUsagePage(page) { usagePage = page; renderUsageTable(); }
    function changeUsagePageSize(size) { usagePageSize = parseInt(size); usagePage = 1; renderUsageTable(); }
    function jumpUsagePage() {
        var p = parseInt(document.getElementById('usageJumpInput').value);
        var total = Math.ceil(usageList.length / usagePageSize) || 1;
        if (p >= 1 && p <= total) { usagePage = p; renderUsageTable(); }
    }

    function downloadWorkbook(wb, filename) {
