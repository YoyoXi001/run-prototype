    ];

    // ========== 生成租户服务级明细（8行/租户） ==========
    function generateTenantDetailRows(tenantName, apiName, totalUsage, totalAmount) {
        var profile = tenantProfiles[tenantName];
        if (!profile) return [];
        var services = apiServiceNames[apiName] || apiServiceNames['企业基本信息'];
        var rows = [];
        var svcIdx = 0;
        var remaining = totalUsage;
        var remainingAmt = totalAmount;
        var totalSlots = 8;
        profile.companies.forEach(function(company) {
            company.departments.forEach(function(dept) {
                dept.systems.forEach(function(sys) {
                    var isLast = (svcIdx === totalSlots - 1);
                    var usage = isLast ? remaining : Math.round(totalUsage * (0.08 + Math.random() * 0.18));
                    if (usage > remaining) usage = remaining;
                    if (usage < 1) usage = 1;
                    remaining -= usage;
                    var amt = isLast ? remainingAmt : Math.round(totalAmount * (usage / totalUsage) * 100) / 100;
                    if (amt > remainingAmt) amt = remainingAmt;
                    remainingAmt -= amt;
                    var billable = Math.round(usage * 0.85);
                    rows.push({
                        tenant: tenantName,
                        company: company.name,
                        department: dept.name,
                        system: sys.name,
                        service: services[svcIdx] || (sys.name + '服务'),
                        totalUsage: usage,
                        validUsage: billable,
                        billableCalls: billable,
                        amount: amt
                    });
                    svcIdx++;
                });
            });
        });
        return rows;
    }

    // ========== 联动数据 ==========
    function getSuppliers() {
        var set = {};
        billRecords.forEach(function(r) { set[r.supplier] = true; });
        return Object.keys(set);
    }
    function getModes(supplier) {
        var set = {};
        billRecords.forEach(function(r) {
            if (!supplier || r.supplier === supplier) set[r.mode] = true;
        });
        return Object.keys(set);
    }
    function getApis(supplier, mode) {
        var set = {};
        billRecords.forEach(function(r) {
            if ((!supplier || r.supplier === supplier) && (!mode || r.mode === mode)) {
                r.apis.forEach(function(a) { set[a] = true; });
            }
        });
        return Object.keys(set);
    }
    function getTenants() {
        var set = {};
        billRecords.forEach(function(r) {
            r.tenants.forEach(function(t) { set[t.name] = true; });
        });
        return Object.keys(set);
    }

    // ========== 联动事件 ==========
    function populateSelect(id, options) {
        var sel = document.getElementById(id);
        sel.innerHTML = '<option value="">请选择</option>';
        options.forEach(function(opt) {
            var o = document.createElement('option');
            o.value = opt;
            o.textContent = opt;
            sel.appendChild(o);
        });
    }

    function onSupplierChange() {
        var supplier = document.getElementById('filterSupplier').value;
        populateSelect('filterMode', getModes(supplier));
        populateSelect('filterApi', getApis(supplier, ''));
    }
    function onModeChange() {
        var supplier = document.getElementById('filterSupplier').value;
        var mode = document.getElementById('filterMode').value;
        populateSelect('filterApi', getApis(supplier, mode));
    }

    // ========== 初始化 ==========
    function init() {
        populateSelect('filterSupplier', getSuppliers());
        populateSelect('filterMode', getModes(''));
        populateSelect('filterApi', getApis('', ''));
        populateSelect('filterTenant', getTenants());
        // 初始化日期选择器
        flatpickr('#filterDateStart', { dateFormat: 'Y-m-d', locale: 'zh', allowInput: true });
        flatpickr('#filterDateEnd', { dateFormat: 'Y-m-d', locale: 'zh', allowInput: true });
        // 默认不查询，列表为空
        renderEmpty();
    }

    function renderEmpty() {
        var thead = document.getElementById('tableHead');
        var tbody = document.getElementById('tableBody');
        var totalEl = document.getElementById('totalCount');
        var headCols = ['计费编号','计费模式','单价','供应商','API','租户','总查询量','有效查询量','计费次数','应付金额'];
        thead.innerHTML = headCols.map(function(c) { return '<th>' + c + '</th>'; }).join('');
        tbody.innerHTML = '<tr><td colspan="10" style="padding:60px 0;color:#999;font-size:14px;">请选择筛选条件后点击查询</td></tr>';
        totalEl.textContent = '共 0 条';
    }

    // ========== 查询 ==========
    function getFilteredRecords() {
        var supplier = document.getElementById('filterSupplier').value;
        var mode = document.getElementById('filterMode').value;
        var api = document.getElementById('filterApi').value;
        var tenant = document.getElementById('filterTenant').value;
        return billRecords.filter(function(r) {
            if (supplier && r.supplier !== supplier) return false;
            if (mode && r.mode !== mode) return false;
            if (api) {
                if (r.apis.indexOf(api) === -1) return false;
            }
            if (tenant) {
                var hasTenant = r.tenants.some(function(t) { return t.name === tenant; });
                if (!hasTenant) return false;
            }
            return true;
        });
    }

    function doQuery() {
        var showDetail = document.getElementById('filterTenantDetail').value === 'show';
        var tenant = document.getElementById('filterTenant').value;
        var filtered = getFilteredRecords();
        renderTable(filtered, showDetail, tenant);
    }

    function doReset() {
        document.getElementById('filterSupplier').value = '';
        document.getElementById('filterMode').value = '';
        document.getElementById('filterApi').value = '';
        document.getElementById('filterTenant').value = '';
        document.getElementById('filterTenantDetail').value = 'hide';
        populateSelect('filterMode', getModes(''));
        populateSelect('filterApi', getApis('', ''));
        // 清空日期
        document.getElementById('filterDateStart')._flatpickr.clear();
        document.getElementById('filterDateEnd')._flatpickr.clear();
        // 列表恢复为空
        renderEmpty();
    }

    // ========== 渲染表格 ==========
    function renderTable(data, showDetail, filterTenant) {
        var thead = document.getElementById('tableHead');
        var tbody = document.getElementById('tableBody');
        var totalEl = document.getElementById('totalCount');

        // 表头
        var headCols = ['计费编号','计费模式','单价','供应商','API','租户','总查询量','有效查询量','计费次数','应付金额'];
        if (showDetail) {
            headCols.splice(6, 0, '公司','部门','系统','服务');
        }
        thead.innerHTML = headCols.map(function(c) { return '<th>' + c + '</th>'; }).join('');

        var html = '';
        var rowCount = 0;

        data.forEach(function(r) {
            var tenants = r.tenants;
            if (filterTenant) {
                tenants = tenants.filter(function(t) { return t.name === filterTenant; });
            }

            if (showDetail) {
                // 展示租户服务级明细
                tenants.forEach(function(t) {
                    var detailRows = generateTenantDetailRows(t.name, r.apis[0], t.usage, t.amount);
                    detailRows.forEach(function(d) {
                        rowCount++;
                        html += '<tr>'
                            + '<td style="font-size:11px;">' + r.billingCode + '</td>'
                            + '<td>' + r.mode + '</td>'
                            + '<td class="price-cell">' + r.price + '</td>'
                            + '<td>' + r.supplier + '</td>'
                            + '<td class="cell-api">' + r.apis[0] + '</td>'
                            + '<td>' + d.tenant + '</td>'
                            + '<td>' + d.company + '</td>'
                            + '<td>' + d.department + '</td>'
                            + '<td>' + d.system + '</td>'
                            + '<td>' + d.service + '</td>'
                            + '<td>' + d.totalUsage.toLocaleString() + '</td>'
                            + '<td>' + d.validUsage.toLocaleString() + '</td>'
                            + '<td>' + d.billableCalls.toLocaleString() + '</td>'
                            + '<td class="amount-text">¥' + d.amount.toFixed(2) + '</td>'
                            + '</tr>';
                    });
                });
            } else {
                // 不展示租户明细（租户级汇总）
                tenants.forEach(function(t) {
                    rowCount++;
                    var billable = Math.round(t.usage * 0.85);
                    var valid = billable;
                    html += '<tr>'
                        + '<td style="font-size:11px;">' + r.billingCode + '</td>'
                        + '<td>' + r.mode + '</td>'
                        + '<td class="price-cell">' + r.price + '</td>'
                        + '<td>' + r.supplier + '</td>'
                        + '<td class="cell-api">' + r.apis[0] + '</td>'
                        + '<td>' + t.name + '</td>'
                        + '<td>' + t.usage.toLocaleString() + '</td>'
                        + '<td>' + valid.toLocaleString() + '</td>'
                        + '<td>' + billable.toLocaleString() + '</td>'
                        + '<td class="amount-text">¥' + t.amount.toLocaleString() + '</td>'
                        + '</tr>';
                });
            }
        });

        if (rowCount === 0) {
            var colSpan = showDetail ? 14 : 10;
            html = '<tr><td colspan="' + colSpan + '" style="padding:40px 0;color:#999;">暂无数据</td></tr>';
        }
        tbody.innerHTML = html;
        totalEl.textContent = '共 ' + rowCount + ' 条';
    }

    // ========== 导出 Excel ==========
    function doExport() {
        var showDetail = document.getElementById('filterTenantDetail').value === 'show';
        var tenant = document.getElementById('filterTenant').value;
        var filtered = getFilteredRecords();

        var headCols = ['计费编号','计费模式','单价','供应商','API','租户','总查询量','有效查询量','计费次数','应付金额'];
        if (showDetail) {
            headCols.splice(6, 0, '公司','部门','系统','服务');
        }

        var aoa = [];
        aoa.push(['外数平台 - 自定义账单导出']);
        aoa.push(['导出时间：' + new Date().toLocaleString('zh-CN')]);
        aoa.push([]);
        aoa.push(headCols);

        filtered.forEach(function(r) {
            var tenants = r.tenants;
            if (tenant) {
                tenants = tenants.filter(function(t) { return t.name === tenant; });
            }
            var priceText = r.price.replace(/<br>/g, ' ');

            if (showDetail) {
                tenants.forEach(function(t) {
                    var detailRows = generateTenantDetailRows(t.name, r.apis[0], t.usage, t.amount);
                    detailRows.forEach(function(d) {
                        aoa.push([r.billingCode, r.mode, priceText, r.supplier, r.apis[0], d.tenant,
                            d.company, d.department, d.system, d.service,
                            d.totalUsage, d.validUsage, d.billableCalls, d.amount.toFixed(2)]);
                    });
                });
            } else {
                tenants.forEach(function(t) {
                    var billable = Math.round(t.usage * 0.85);
                    aoa.push([r.billingCode, r.mode, priceText, r.supplier, r.apis[0], t.name,
                        t.usage, billable, billable, t.amount.toFixed(2)]);
                });
            }
        });

        var colCount = showDetail ? 14 : 10;
        var ws = XLSX.utils.aoa_to_sheet(aoa);
        ws['!merges'] = [
            { s:{r:0,c:0}, e:{r:0,c:colCount - 1} },
            { s:{r:1,c:0}, e:{r:1,c:colCount - 1} }
        ];
        ws['!cols'] = showDetail
            ? [{wch:26},{wch:8},{wch:20},{wch:10},{wch:14},{wch:8},{wch:12},{wch:10},{wch:12},{wch:16},{wch:10},{wch:10},{wch:10},{wch:12}]
            : [{wch:26},{wch:8},{wch:20},{wch:10},{wch:14},{wch:8},{wch:10},{wch:10},{wch:10},{wch:12}];

        var wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, '自定义账单');
        var wbout = XLSX.write(wb, { bookType:'xlsx', type:'array' });
        var blob = new Blob([wbout], { type:'application/octet-stream' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = '自定义账单_' + new Date().toISOString().slice(0,10) + '.xlsx';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }

    // ========== 导航 ==========
    function goBack() {
        window.location.href = '账单管理.html';
    }

    // ========== 启动 ==========
    init();
</script>
<script>
document.addEventListener('click', function(e) {
    var link = e.target.closest('a.sidebar-item, a.menu-item');
    if (link && link.getAttribute('href') === 'index.html') {
        e.preventDefault();
        document.querySelectorAll('.sidebar-item, .menu-item').forEach(function(m) { m.classList.remove('active'); });
        link.classList.add('active');
    }
});
</script>
<script>
document.addEventListener('click', function(e) {
    var navTab = e.target.closest('a.nav-tab');
    if (navTab) {
        var navKeys = {'数据门户':'portal','外源管理':'external','服务管理':'service','监控统计':'monitor','运营管理':'operation','个人中心':'personal','系统管理':'system'};
        var text = navTab.textContent.trim();
        if (navKeys[text]) localStorage.setItem('_navMenu', navKeys[text]);
    }
});
</script>
