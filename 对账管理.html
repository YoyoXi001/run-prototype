    // 其余记录自动生成默认明细
    (function() {
        var tenants = ['某某金控', '某某信托', '某某租赁', '某某保险', '某某银行'];
        for (var i = 0; i < allData.length; i++) {
            var r = allData[i];
            if (!detailsMap[r.id]) {
                var count = r.tenantCount;
                var arr = [];
                var remainingCalls = Math.round(r.totalAmount / 1.5);
                var remainingAmount = r.totalAmount;
                for (var j = 0; j < count; j++) {
                    var isLast = j === count - 1;
                    var ratio = isLast ? (100 - arr.reduce(function(s, d) { return s + d.ratio; }, 0)) : Math.round((100 / count + (Math.random() * 10 - 5)) * 10) / 10;
                    var calls = isLast ? remainingCalls : Math.round(remainingCalls * ratio / 100);
                    var amount = isLast ? remainingAmount : Math.round(r.totalAmount * ratio / 100 * 100) / 100;
                    remainingCalls -= calls;
                    remainingAmount -= amount;
                    arr.push({
                        tenant: tenants[j], supplier: r.supplier, api: r.api,
                        calls: calls, ratio: Math.round(ratio * 10) / 10, amount: amount
                    });
                }
                detailsMap[r.id] = arr;
            }
        }
    })();

    // ========== 分页状态 ==========
    var currentPage = 1;
    var pageSize = 10;
    var filteredData = [];

    // ========== 初始化 ==========
    var defaultRange = { start: '2024-05-01', end: '2024-05-31' };
    flatpickr('#filterDateStart', { dateFormat: 'Y-m-d', locale: 'zh', allowInput: true, defaultDate: defaultRange.start });
    flatpickr('#filterDateEnd', { dateFormat: 'Y-m-d', locale: 'zh', allowInput: true, defaultDate: defaultRange.end });

    doQuery();

    // ========== 渲染表格 ==========
    function renderTable(data) {
        filteredData = data;
        var total = data.length;
        var totalPages = Math.ceil(total / pageSize) || 1;
        if (currentPage < 1) currentPage = 1;
        if (currentPage > totalPages) currentPage = totalPages;

        var start = (currentPage - 1) * pageSize;
        var end = Math.min(start + pageSize, total);
        var pageData = data.slice(start, end);

        var tbody = document.getElementById('reconTableBody');
        if (pageData.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8" style="padding:40px 0;color:#999;">暂无数据</td></tr>';
        } else {
            var html = '';
            for (var i = 0; i < pageData.length; i++) {
                var r = pageData[i];
                var seq = start + i + 1;
                var statusClass = '';
                if (r.status === '待确认') statusClass = 'status-pending-confirm';
                else if (r.status === '已确认') statusClass = 'status-confirmed';
                else if (r.status === '待分摊') statusClass = 'status-pending';
                else if (r.status === '已分摊') statusClass = 'status-allocated';

                // 操作栏：查看详情 + 状态流转按钮
                var actions = '<a class="action-link" onclick="openDetailModal(' + r.id + ')">查看分摊明细</a>';
                var nextStatus = getNextStatus(r.status);
                if (nextStatus) {
                    actions += '<a class="action-link status-link" onclick="advanceStatus(' + r.id + ')">' + nextStatus + '</a>';
                }

                html += '<tr>'
                    + '<td>' + seq + '</td>'
                    + '<td class="col-period">' + r.period + '</td>'
                    + '<td>' + r.supplier + '</td>'
                    + '<td>' + r.api + '</td>'
                    + '<td class="amount">&yen;' + r.totalAmount.toLocaleString('zh-CN', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + '</td>'
                    + '<td>' + r.tenantCount + '</td>'
                    + '<td><span class="status-badge ' + statusClass + '">' + r.status + '</span></td>'
                    + '<td>' + actions + '</td>'
                    + '</tr>';
            }
            tbody.innerHTML = html;
        }
        renderPagination(total, totalPages);
    }

    // ========== 状态流转 ==========
    function advanceStatus(id) {
        for (var i = 0; i < allData.length; i++) {
            if (allData[i].id === id) {
                var next = getNextStatus(allData[i].status);
                if (next) {
                    allData[i].status = next;
                    renderTable(filteredData);
                }
                break;
            }
        }
    }

    // ========== 渲染分页栏 ==========
    function renderPagination(total, totalPages) {
        var html = '<span class="total-text">共 ' + total + ' 条</span>';
        html += '<button class="page-btn" ' + (currentPage === 1 ? 'disabled' : '') + ' onclick="goToPage(' + (currentPage - 1) + ')">&lt;</button>';

        var startP = Math.max(1, currentPage - 2);
        var endP = Math.min(totalPages, startP + 4);
        if (endP - startP < 4) startP = Math.max(1, endP - 4);
        for (var p = startP; p <= endP; p++) {
            html += '<span class="page-number' + (p === currentPage ? ' active' : '') + '" onclick="goToPage(' + p + ')">' + p + '</span>';
        }

        html += '<button class="page-btn" ' + (currentPage === totalPages ? 'disabled' : '') + ' onclick="goToPage(' + (currentPage + 1) + ')">&gt;</button>';

        html += '<select class="page-size-select" onchange="changePageSize(this.value)">';
        var sizes = [10, 20, 50];
        for (var i = 0; i < sizes.length; i++) {
            html += '<option' + (sizes[i] === pageSize ? ' selected' : '') + '>' + sizes[i] + '条/页</option>';
        }
        html += '</select>';

        html += '<div class="jump-section"><span>前往</span>'
            + '<input type="text" id="jumpPageInput" value="' + currentPage + '" onkeydown="if(event.key===\'Enter\') jumpToPage()">'
            + '<span>页</span></div>';

        document.getElementById('paginationWrap').innerHTML = html;
    }

    function goToPage(p) {
        currentPage = p;
        renderTable(filteredData);
    }
    function changePageSize(size) {
        pageSize = parseInt(size) || 10;
        currentPage = 1;
        renderTable(filteredData);
    }
    function jumpToPage() {
        var val = parseInt(document.getElementById('jumpPageInput').value);
        if (!isNaN(val) && val >= 1) {
            currentPage = val;
            renderTable(filteredData);
        }
    }

    // ========== 查询 & 重置 ==========
    function doQuery() {
        var dateStart = document.getElementById('filterDateStart').value;
        var dateEnd = document.getElementById('filterDateEnd').value;
        var supplier = document.getElementById('filterSupplier').value;
        var api = document.getElementById('filterApi').value;
        var status = document.getElementById('filterStatus').value;

        var filtered = allData.filter(function(r) {
            if (dateStart && r.periodEnd < dateStart) return false;
            if (dateEnd && r.periodStart > dateEnd) return false;
            if (supplier && r.supplier !== supplier) return false;
            if (api && r.api !== api) return false;
            if (status && r.status !== status) return false;
            return true;
        });
        renderTable(filtered);
    }

    function doReset() {
        document.getElementById('filterDateStart')._flatpickr.setDate(defaultRange.start);
        document.getElementById('filterDateEnd')._flatpickr.setDate(defaultRange.end);
        document.getElementById('filterSupplier').value = '';
        document.getElementById('filterApi').value = '';
        document.getElementById('filterStatus').value = '';
        currentPage = 1;
        renderTable(allData);
    }

    // ========== 分摊明细弹窗 ==========
    function openDetailModal(id) {
        var r = null;
        for (var i = 0; i < allData.length; i++) {
            if (allData[i].id === id) { r = allData[i]; break; }
        }
        if (!r) return;

        document.getElementById('detailModalTitle').textContent = '分摊明细 - ' + r.supplier + ' ' + r.api;

        // 概要
        var summaryHtml = '<div class="task-summary-item"><span class="label">对账周期</span><span class="value">' + r.period + '</span></div>'
            + '<div class="task-summary-item"><span class="label">供应商</span><span class="value">' + r.supplier + '</span></div>'
            + '<div class="task-summary-item"><span class="label">API</span><span class="value">' + r.api + '</span></div>'
            + '<div class="task-summary-item"><span class="label">总金额</span><span class="value" style="color:#f89d34;">&yen;' + r.totalAmount.toLocaleString('zh-CN', {minimumFractionDigits: 2}) + '</span></div>'
            + '<div class="task-summary-item"><span class="label">参与租户数量</span><span class="value">' + r.tenantCount + '</span></div>'
            + '<div class="task-summary-item"><span class="label">状态</span><span class="value">' + r.status + '</span></div>';
        document.getElementById('detailSummary').innerHTML = summaryHtml;

        // 明细表格
        var details = detailsMap[id] || [];
        var html = '';
        var totalCalls = 0;
        var totalRatio = 0;
        var totalAmount = 0;
        for (var i = 0; i < details.length; i++) {
            var d = details[i];
            totalCalls += d.calls;
            totalRatio += d.ratio;
            totalAmount += d.amount;
            html += '<tr>'
                + '<td>' + (i + 1) + '</td>'
                + '<td class="col-period">' + r.period + '</td>'
                + '<td>' + d.tenant + '</td>'
                + '<td>' + d.supplier + '</td>'
                + '<td>' + d.api + '</td>'
                + '<td>' + d.calls.toLocaleString() + '</td>'
                + '<td>' + d.ratio + '%</td>'
                + '<td class="amount">&yen;' + d.amount.toLocaleString('zh-CN', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + '</td>'
                + '</tr>';
        }
        document.getElementById('detailTableBody').innerHTML = html;

        // 合计行
        var footHtml = '<tr>'
            + '<td colspan="5" style="text-align:center; font-weight:600;">合计</td>'
            + '<td>' + totalCalls.toLocaleString() + '</td>'
            + '<td>' + (Math.round(totalRatio * 10) / 10) + '%</td>'
            + '<td class="amount">&yen;' + totalAmount.toLocaleString('zh-CN', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + '</td>'
            + '</tr>';
        document.getElementById('detailTableFoot').innerHTML = footHtml;

        document.getElementById('detailModal').classList.add('active');
    }

    function closeDetailModal() {
        document.getElementById('detailModal').classList.remove('active');
    }

    // 点击遮罩关闭
    document.getElementById('detailModal').addEventListener('click', function(e) {
        if (e.target === this) closeDetailModal();
    });
</script>
